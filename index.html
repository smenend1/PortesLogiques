<style>

*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf2ff,#f8fbff);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink)}
header{background:linear-gradient(135deg,#1d4ed8,#0f172a);color:white;padding:18px 16px 24px}header h1{margin:0;font-size:1.6rem}header p{margin:.35rem 0 0;opacity:.9}.wrap{max-width:1180px;margin:auto;padding:14px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:-22px}.tab{border:1px solid rgba(255,255,255,.45);background:white;color:#123;padding:10px 12px;border-radius:14px;cursor:pointer;font-weight:700;box-shadow:0 6px 18px #1e3a8a1c}.tab.active{background:#1d4ed8;color:white;border-color:#1d4ed8}.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 28px #1e3a8a12}.card h2,.card h3{margin:.1rem 0 .6rem}.small{font-size:.92rem;color:var(--muted)}label{font-weight:700;display:block;margin:.5rem 0 .25rem}select,input,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:#fff;font:inherit}textarea{min-height:74px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:0;background:var(--blue);color:white;border-radius:12px;padding:10px 12px;font-weight:800;cursor:pointer}.btn.secondary{background:#e2e8f0;color:#102033}.btn.ok{background:var(--ok)}.btn.bad{background:var(--bad)}.btn.warn{background:var(--warn);color:#111}.pill{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:#f8fbff;margin:3px;font-weight:700}.bitrow{display:flex;gap:10px;flex-wrap:wrap}.bit{min-width:72px;border:2px solid var(--line);border-radius:16px;background:#f8fbff;padding:10px;text-align:center;cursor:pointer}.bit strong{display:block;font-size:1.5rem}.bit.on{background:#dcfce7;border-color:#22c55e}.bit.off{background:#fee2e2;border-color:#ef4444}.out{font-size:2.2rem;font-weight:900;text-align:center;border-radius:20px;padding:14px;background:#f8fbff;border:2px solid var(--line)}.out.on{background:#dcfce7;border-color:#22c55e;color:#166534}.out.off{background:#fee2e2;border-color:#ef4444;color:#991b1b}table{border-collapse:collapse;width:100%;font-size:.95rem}th,td{border:1px solid var(--line);padding:8px;text-align:center}th{background:#dbeafe}.one{background:#dcfce7;font-weight:800}.zero{background:#fee2e2;font-weight:800}.svgbox{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:8px;overflow:auto}.wire1{stroke:#16a34a!important;stroke-width:5}.wire0{stroke:#dc2626!important;stroke-width:4;stroke-dasharray:6 5}.gatebody{fill:#fff;stroke:#1d4ed8;stroke-width:3}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.steps{background:#f8fbff;border:1px solid var(--line);border-radius:14px;padding:10px;line-height:1.65}.kmap{display:grid;grid-template-columns:42px repeat(4,1fr);gap:2px;max-width:520px}.kcell,.khead{border:1px solid var(--line);min-height:42px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:white;font-weight:800}.khead{background:#dbeafe}.kcell.on{background:#dcfce7}.kcell.off{background:#fee2e2}.question{font-size:1.05rem}.hidden{display:none}.score{font-size:1.3rem;font-weight:900}.learnitem{cursor:pointer}.learnitem.active{outline:3px solid #93c5fd}.footer{padding:30px;text-align:center;color:#64748b}.printonly{display:none}@media print{header,.tabs,.btns,.no-print,.footer{display:none!important}body{background:white}.panel{display:none!important}.panel.active{display:block!important}.card{break-inside:avoid;box-shadow:none}.printonly{display:block}body.print-sheet main.wrap{max-width:none;padding:0}body.print-sheet .panel{display:none!important}body.print-sheet #teacher{display:block!important}body.print-sheet #teacher .grid{display:block!important}body.print-sheet #teacher .card{display:none!important;border:0;box-shadow:none}body.print-sheet #sheetCard{display:block!important}body.print-sheet #sheetCard h2{margin-top:0}}

<body>
<header><div class="wrap"><h1>Portes Lògiques Plus v2.3</h1><p>Laboratori visual: portes, taules de veritat, circuits amb NOT final, expressions, Karnaugh i pràctica.</p></div></header>
<main class="wrap">
<nav class="tabs no-print" id="tabs"></nav>
<section id="sim" class="panel active"></section>
<section id="learn" class="panel"></section>
<section id="circuit" class="panel"></section>
<section id="expr" class="panel"></section>
<section id="karnaugh" class="panel"></section>
<section id="practice" class="panel"></section>
<section id="teacher" class="panel"></section>
</main><div class="footer">PWA instal·lable · Funciona sense connexió després de carregar-la una vegada.</div>
<script>
'use strict';
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const tabs=[['sim','Simulador'],['learn','Aprendre'],['circuit','Circuits'],['expr','Expressions'],['karnaugh','Karnaugh'],['practice','Pràctica'],['teacher','Docent']];
const GATES={AND:{n:2,txt:'AND',sym:'S = A · B',fn:a=>a.every(Boolean),desc:'La sortida només és 1 si totes les entrades són 1.',ex:'Motor que arrenca si hi ha botó premut i porta tancada.'},OR:{n:2,txt:'OR',sym:'S = A + B',fn:a=>a.some(Boolean),desc:'La sortida és 1 si com a mínim una entrada és 1.',ex:'Alarma que sona si s’obre la porta o la finestra.'},NOT:{n:1,txt:'NOT',sym:'S = ¬A',fn:a=>!a[0],desc:'Inverteix el valor de l’entrada.',ex:'Pilot que s’encén quan el dipòsit no és ple.'},NAND:{n:2,txt:'NAND',sym:'S = ¬(A · B)',fn:a=>!a.every(Boolean),desc:'És la negació de l’AND.',ex:'Sistema de seguretat que bloqueja només quan dues condicions es compleixen.'},NOR:{n:2,txt:'NOR',sym:'S = ¬(A + B)',fn:a=>!a.some(Boolean),desc:'És la negació de l’OR.',ex:'Sortida activa només si no hi ha cap senyal.'},XOR:{n:2,txt:'XOR',sym:'S = A ⊕ B',fn:a=>a.filter(Boolean).length%2===1,desc:'La sortida és 1 quan les entrades són diferents.',ex:'Detector de diferència entre dos sensors.'},XNOR:{n:2,txt:'XNOR',sym:'S = ¬(A ⊕ B)',fn:a=>a.filter(Boolean).length%2===0,desc:'La sortida és 1 quan les entrades són iguals.',ex:'Comparador d’igualtat entre dos senyals.'},MAJ:{n:3,txt:'Majoritària',sym:'S = AB + AC + BC',fn:a=>a.filter(Boolean).length>=2,desc:'La sortida és 1 si la majoria d’entrades són 1.',ex:'Votació de tres sensors: decideix la majoria.'}};
let sim={gate:'AND',bits:[0,0,0]}; let teacherSol=true;
function bit(v){return v?1:0} function evalGate(g,arr){return bit(GATES[g].fn(arr.map(Boolean)))}
function combos(n){let r=[];for(let i=0;i<Math.pow(2,n);i++){let row=[];for(let b=n-1;b>=0;b--)row.push((i>>b)&1);r.push(row)}return r}
function truth(g){let n=GATES[g].n;return combos(n).map(c=>[...c,evalGate(g,c)])}
function gateOptions(sel){return Object.keys(GATES).map(k=>`<option value="${k}" ${sel===k?'selected':''}>${GATES[k].txt}</option>`).join('')}
function tabsInit(){tabs.forEach(([id,name])=>$('#tabs').insertAdjacentHTML('beforeend',`<button class="tab ${id==='sim'?'active':''}" data-tab="${id}">${name}</button>`)); $$('.tab').forEach(b=>b.onclick=()=>{ $$('.tab').forEach(x=>x.classList.remove('active')); b.classList.add('active'); $$('.panel').forEach(p=>p.classList.remove('active')); $('#'+b.dataset.tab).classList.add('active')})}
function tableHTML(g,withInter=false){let n=GATES[g].n, names=['A','B','C'].slice(0,n);let rows=truth(g);let h='<table><thead><tr>'+names.map(x=>`<th>${x}</th>`).join('')+(withInter?'<th>Expressió</th>':'')+`<th>Sortida ${GATES[g].txt}</th></tr></thead><tbody>`;rows.forEach(r=>{h+='<tr>'+r.slice(0,n).map(x=>`<td class="${x?'one':'zero'}">${x}</td>`).join(''); if(withInter)h+=`<td class="mono">${GATES[g].sym}</td>`; h+=`<td class="${r[n]?'one':'zero'}">${r[n]}</td></tr>`});return h+'</tbody></table>'}
function gateBase(g){return g==='NAND'?'AND':g==='NOR'?'OR':g==='XNOR'?'XOR':g}
function gateIsNeg(g){return ['NOT','NAND','NOR','XNOR'].includes(g)}
function gateOutX(g,x,w){return x+w+(gateIsNeg(g)?24:0)}
function gateBodySVG(g,x,y,w,h){
  let base=gateBase(g), cy=y+h/2, out=gateOutX(g,x,w);
  let bubble=gateIsNeg(g)?`<circle cx="${x+w+12}" cy="${cy}" r="10" fill="white" stroke="#1d4ed8" stroke-width="3"/>`:'';
  let label=`<text x="${x+w/2}" y="${cy+7}" text-anchor="middle" font-size="20" font-weight="900" fill="#1d4ed8">${GATES[g].txt}</text>`;
  let shape='';
  if(base==='NOT'){
    shape=`<polygon points="${x},${y} ${x},${y+h} ${x+w},${cy}" class="gatebody"/>`;
  }else if(base==='AND'){
    shape=`<path d="M ${x} ${y} L ${x+w*.52} ${y} Q ${x+w} ${y} ${x+w} ${cy} Q ${x+w} ${y+h} ${x+w*.52} ${y+h} L ${x} ${y+h} Z" class="gatebody"/>`;
  }else if(base==='OR'){
    shape=`<path d="M ${x} ${y} C ${x+w*.42} ${y} ${x+w*.82} ${y+h*.05} ${x+w} ${cy} C ${x+w*.82} ${y+h*.95} ${x+w*.42} ${y+h} ${x} ${y+h} C ${x+w*.24} ${y+h*.68} ${x+w*.24} ${y+h*.32} ${x} ${y} Z" class="gatebody"/>`;
  }else if(base==='XOR'){
    shape=`<path d="M ${x+12} ${y} C ${x+w*.42} ${y} ${x+w*.82} ${y+h*.05} ${x+w} ${cy} C ${x+w*.82} ${y+h*.95} ${x+w*.42} ${y+h} ${x+12} ${y+h} C ${x+w*.36} ${y+h*.66} ${x+w*.36} ${y+h*.34} ${x+12} ${y} Z" class="gatebody"/><path d="M ${x} ${y} C ${x+w*.25} ${y+h*.34} ${x+w*.25} ${y+h*.66} ${x} ${y+h}" fill="none" stroke="#1d4ed8" stroke-width="3"/>`;
  }else{
    shape=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="18" class="gatebody"/>`;
  }
  return `${shape}${bubble}${label}`;
}
function svgGate(g,vals){
  let n=GATES[g].n, out=evalGate(g,vals.slice(0,n));let a=vals[0]||0,b=vals[1]||0,c=vals[2]||0;
  let ix=20, gx=125, gy=38, gw=112, gh=104, outx=gateOutX(g,gx,gw);
  let inputLines=n===1?`<line x1="${ix}" y1="90" x2="${gx}" y2="90" class="${a?'wire1':'wire0'}"/><text x="${ix}" y="78">A=${a}</text>`:
    n===2?`<line x1="${ix}" y1="65" x2="${gx}" y2="65" class="${a?'wire1':'wire0'}"/><line x1="${ix}" y1="115" x2="${gx}" y2="115" class="${b?'wire1':'wire0'}"/><text x="${ix}" y="53">A=${a}</text><text x="${ix}" y="137">B=${b}</text>`:
    `<line x1="${ix}" y1="50" x2="${gx}" y2="50" class="${a?'wire1':'wire0'}"/><line x1="${ix}" y1="90" x2="${gx}" y2="90" class="${b?'wire1':'wire0'}"/><line x1="${ix}" y1="130" x2="${gx}" y2="130" class="${c?'wire1':'wire0'}"/><text x="${ix}" y="38">A=${a}</text><text x="${ix}" y="83">B=${b}</text><text x="${ix}" y="152">C=${c}</text>`;
  let title=`<text x="180" y="22" text-anchor="middle" font-size="14" font-weight="800" fill="#334155">Logigrama de la porta ${GATES[g].txt}</text>`;
  return `<svg viewBox="0 0 380 190" width="100%" height="190" role="img" aria-label="Logigrama de la porta ${GATES[g].txt}">${title}${inputLines}${gateBodySVG(g,gx,gy,gw,gh)}<line x1="${outx}" y1="90" x2="340" y2="90" class="${out?'wire1':'wire0'}"/><text x="292" y="76" font-size="18" font-weight="900">S=${out}</text></svg>`;
}
function renderSim(){let g=sim.gate,n=GATES[g].n,vals=sim.bits.slice(0,n),out=evalGate(g,vals);$('#sim').innerHTML=`<div class="grid"><div class="card"><h2>Simulador de porta</h2><label>Porta lògica</label><select id="simGate">${gateOptions(g)}</select><p class="small">Toca les entrades per alternar 0 i 1. La sortida, el dibuix i la taula es recalculen sols.</p><div class="bitrow">${['A','B','C'].slice(0,n).map((name,i)=>`<button class="bit ${vals[i]?'on':'off'}" data-bit="${i}"><span>${name}</span><strong>${vals[i]}</strong></button>`).join('')}</div><h3>Sortida</h3><div class="out ${out?'on':'off'}">S = ${out}</div><div class="steps"><strong>Lectura:</strong> ${GATES[g].desc}<br><strong>Expressió:</strong> <span class="mono">${GATES[g].sym}</span><br><strong>Exemple:</strong> ${GATES[g].ex}</div><div class="btns"><button class="btn secondary" onclick="copyText(document.querySelector('#simTable').innerText)">Copiar taula</button><button class="btn secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h2>Dibuix de la porta</h2><div class="svgbox">${svgGate(g,vals)}</div></div><div class="card" style="grid-column:1/-1"><h2>Taula de veritat automàtica</h2><div id="simTable">${tableHTML(g)}</div></div></div>`;$('#simGate').onchange=e=>{sim.gate=e.target.value;renderSim()};$$('[data-bit]').forEach(b=>b.onclick=()=>{let i=+b.dataset.bit;sim.bits[i]=sim.bits[i]?0:1;renderSim()})}
function renderLearn(){let keys=Object.keys(GATES);$('#learn').innerHTML=`<div class="grid"><div class="card"><h2>Mode aprendre</h2><p class="small">Tria una porta per veure’n símbol, taula, interpretació i exemple.</p>${keys.map(k=>`<div class="card learnitem" data-learn="${k}"><h3>${GATES[k].txt}</h3><p>${GATES[k].desc}</p><p class="mono">${GATES[k].sym}</p></div>`).join('')}</div><div class="card" id="learnDetail"></div></div>`;function detail(k){$('#learnDetail').innerHTML=`<h2>${GATES[k].txt}</h2><div class="svgbox">${svgGate(k,[1,0,1])}</div><p><strong>Idea clau:</strong> ${GATES[k].desc}</p><p><strong>Exemple:</strong> ${GATES[k].ex}</p><p><strong>Expressió:</strong> <span class="mono">${GATES[k].sym}</span></p>${tableHTML(k)}`;$$('.learnitem').forEach(x=>x.classList.toggle('active',x.dataset.learn===k))}$$('.learnitem').forEach(x=>x.onclick=()=>detail(x.dataset.learn));detail('AND')}
function renderCircuit(){$('#circuit').innerHTML=`<div class="grid"><div class="card"><h2>Constructor de circuit</h2><p class="small">Circuit de tres portes dibuixat com a logigrama: G1(A,B), G2(X,C) i G3 = NOT(Y). Així es veu clarament la inversió final.</p><label>Porta 1</label><select id="g1">${gateOptions('AND')}</select><label>Porta 2</label><select id="g2">${gateOptions('OR')}</select><label>Porta 3</label><select id="g3"><option value="NOT" selected>NOT · inversor final</option></select><label>Entrades</label><div class="bitrow" id="circBits"></div><div class="btns"><button class="btn" id="updateCircuit">Actualitza</button><button class="btn secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h2>Logigrama del circuit</h2><div id="circSvg" class="svgbox"></div><div id="circSteps" class="steps"></div></div><div class="card" style="grid-column:1/-1"><h2>Taula de veritat del circuit</h2><div id="circTable"></div></div></div>`;let bits=[0,1,0];function draw(){let g1=$('#g1').value,g2=$('#g2').value,g3='NOT';let x=evalGate(g1,[bits[0],bits[1]]),y=evalGate(g2,[x,bits[2]]),s=evalGate(g3,[y]);$('#circBits').innerHTML=['A','B','C'].map((n,i)=>`<button class="bit ${bits[i]?'on':'off'}" data-cbit="${i}"><span>${n}</span><strong>${bits[i]}</strong></button>`).join('');$$('[data-cbit]').forEach(b=>b.onclick=()=>{bits[+b.dataset.cbit]^=1;draw()});let g1x=105,g1y=35,g2x=330,g2y=80,g3x=520,g3y=88,w=108,h=96,g1out=gateOutX(g1,g1x,w),g2out=gateOutX(g2,g2x,w),g3out=gateOutX(g3,g3x,w);$('#circSvg').innerHTML=`<svg viewBox="0 0 760 270" width="100%" height="270" role="img" aria-label="Logigrama de circuit lògic amb NOT final"><text x="380" y="22" text-anchor="middle" font-size="15" font-weight="900" fill="#334155">Logigrama: S = NOT(${GATES[g2].txt}(${GATES[g1].txt}(A,B), C))</text><line x1="25" y1="62" x2="${g1x}" y2="62" class="${bits[0]?'wire1':'wire0'}"/><line x1="25" y1="112" x2="${g1x}" y2="112" class="${bits[1]?'wire1':'wire0'}"/>${gateBodySVG(g1,g1x,g1y,w,h)}<line x1="${g1out}" y1="83" x2="${g2x}" y2="108" class="${x?'wire1':'wire0'}"/><line x1="25" y1="205" x2="${g2x}" y2="152" class="${bits[2]?'wire1':'wire0'}"/>${gateBodySVG(g2,g2x,g2y,w,h)}<line x1="${g2out}" y1="128" x2="${g3x}" y2="136" class="${y?'wire1':'wire0'}"/>${gateBodySVG(g3,g3x,g3y,w,h)}<line x1="${g3out}" y1="136" x2="730" y2="136" class="${s?'wire1':'wire0'}"/><text x="28" y="52">A=${bits[0]}</text><text x="28" y="104">B=${bits[1]}</text><text x="28" y="195">C=${bits[2]}</text><text x="255" y="72" font-size="16" font-weight="900">X=${x}</text><text x="475" y="115" font-size="16" font-weight="900">Y=${y}</text><text x="675" y="120" font-size="18" font-weight="900">S=${s}</text></svg>`;$('#circSteps').innerHTML=`<strong>Pas 1:</strong> X = ${GATES[g1].txt}(A,B) = ${x}<br><strong>Pas 2:</strong> Y = ${GATES[g2].txt}(X,C) = ${y}<br><strong>Pas 3:</strong> S = NOT(Y) = ${s}<br><strong>Lectura del logigrama:</strong> els fils verds transporten 1 i els vermells discontinus transporten 0.`;let rows=combos(3).map(r=>{let x=evalGate(g1,[r[0],r[1]]);let y=evalGate(g2,[x,r[2]]);let s=evalGate(g3,[y]);return [...r,x,y,s]});$('#circTable').innerHTML='<table><tr><th>A</th><th>B</th><th>C</th><th>X</th><th>Y</th><th>S = NOT(Y)</th></tr>'+rows.map(r=>'<tr>'+r.map(v=>`<td class="${v?'one':'zero'}">${v}</td>`).join('')+'</tr>').join('')+'</table>'}$('#g1').onchange=draw;$('#g2').onchange=draw;$('#updateCircuit').onclick=draw;draw()}
function safeExpr(expr,A,B,C){let e=expr.replace(/\s+/g,'').replace(/¬/g,'!').replace(/·/g,'&').replace(/\+/g,'|').replace(/⊕/g,'^'); if(!/^[ABC01!&|^()]+$/i.test(e))throw Error('Expressió no vàlida'); e=e.replace(/A/gi,A?'1':'0').replace(/B/gi,B?'1':'0').replace(/C/gi,C?'1':'0'); return Function(`return Number(Boolean(${e}))`)()}
function renderExpr(){$('#expr').innerHTML=`<div class="grid"><div class="card"><h2>Expressió → taula</h2><p class="small">Escriu expressions amb A, B, C i operadors: ! o ¬, & o ·, | o +, ^ per XOR.</p><textarea id="exprIn">(A & B) | C</textarea><div class="btns"><button class="btn" id="exprCalc">Genera taula</button><button class="btn secondary" onclick="copyText(document.querySelector('#exprOut').innerText)">Copiar</button></div><p class="small">Exemples: <span class="mono">A&B</span>, <span class="mono">!A|B</span>, <span class="mono">(A^B)&C</span></p></div><div class="card"><h2>Resultat</h2><div id="exprOut"></div></div></div>`;$('#exprCalc').onclick=()=>{let e=$('#exprIn').value;try{let rows=combos(3).map(r=>[...r,safeExpr(e,r[0],r[1],r[2])]);$('#exprOut').innerHTML='<table><tr><th>A</th><th>B</th><th>C</th><th>S</th></tr>'+rows.map(r=>'<tr>'+r.map(v=>`<td class="${v?'one':'zero'}">${v}</td>`).join('')+'</tr>').join('')+'</table>'}catch(err){$('#exprOut').innerHTML='<p class="bad">No puc interpretar l’expressió. Revisa els símbols.</p>'}};$('#exprCalc').click()}
function renderKarnaugh(){let vals=Array(16).fill(0);let gray=['00','01','11','10'];$('#karnaugh').innerHTML=`<div class="grid"><div class="card"><h2>Mapa de Karnaugh 4 variables</h2><p class="small">Toca les cel·les per posar 0 o 1. La simplificació automàtica és orientativa: mostra els minterms i detecta casos senzills.</p><div id="kmap"></div><div class="btns"><button class="btn secondary" id="clearK">Neteja</button><button class="btn secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h2>Expressió</h2><div id="kexpr" class="steps mono"></div><p class="small">Per fer agrupacions visuals avançades es recomana treballar-les a classe sobre la graella.</p></div></div>`;function draw(){let html='<div class="kmap"><div class="khead">AB\\CD</div>'+gray.map(x=>`<div class="khead">${x}</div>`).join('');gray.forEach((ab,ri)=>{html+=`<div class="khead">${ab}</div>`;gray.forEach((cd,ci)=>{let idx=parseInt(ab+cd,2);html+=`<button class="kcell ${vals[idx]?'on':'off'}" data-k="${idx}">${vals[idx]}</button>`})});html+='</div>';$('#kmap').innerHTML=html;$$('[data-k]').forEach(b=>b.onclick=()=>{vals[+b.dataset.k]^=1;draw()});let mins=vals.map((v,i)=>v?i:null).filter(v=>v!==null);$('#kexpr').innerHTML=mins.length?`Σm(${mins.join(', ')})<br>Forma canònica: ${mins.map(i=>minterm(i)).join(' + ')}`:'S = 0'}function minterm(i){let b=i.toString(2).padStart(4,'0'),names=['A','B','C','D'];return b.split('').map((x,j)=>x==='1'?names[j]:'¬'+names[j]).join('·')}$('#clearK').onclick=()=>{vals.fill(0);draw()};draw()}
function makeQuestion(){let gs=Object.keys(GATES);let g=gs[Math.floor(Math.random()*gs.length)];let n=GATES[g].n;let c=combos(n)[Math.floor(Math.random()*Math.pow(2,n))];let ans=evalGate(g,c);return{g,n,c,ans,text:`Calcula la sortida de ${GATES[g].txt} amb ${['A','B','C'].slice(0,n).map((x,i)=>x+'='+c[i]).join(', ')}.`}}
function renderPractice(){let qs=[],score=0,idx=0;$('#practice').innerHTML=`<div class="grid"><div class="card"><h2>Pràctica autocorregible</h2><label>Nivell</label><select id="level"><option>N1 · identificar</option><option>N2 · calcular sortides</option><option>N3 · interpretar circuits</option><option>N4 · dissenyar</option></select><div class="btns"><button class="btn" id="newQuiz">Comença 10 preguntes</button></div><div id="quizBox"></div></div><div class="card"><h2>Progrés</h2><div id="quizScore" class="score">Encara no iniciat</div><div class="steps"><strong>N1</strong>: reconèixer portes.<br><strong>N2</strong>: calcular sortides.<br><strong>N3</strong>: llegir circuits.<br><strong>N4</strong>: dissenyar funcions simples.</div></div></div>`;function start(){qs=Array.from({length:10},makeQuestion);score=0;idx=0;show()}function show(){if(idx>=qs.length){$('#quizBox').innerHTML=`<h3>Finalitzat</h3><p class="score">${score}/10</p>`;$('#quizScore').textContent=`Resultat: ${score}/10`;return}let q=qs[idx];$('#quizBox').innerHTML=`<p class="question"><strong>Pregunta ${idx+1}/10:</strong> ${q.text}</p><div class="btns"><button class="btn ok" data-answer="1">Sortida 1</button><button class="btn bad" data-answer="0">Sortida 0</button></div><div id="fb"></div>`;$$('[data-answer]').forEach(b=>b.onclick=()=>{let ok=+b.dataset.answer===q.ans;if(ok)score++;$('#fb').innerHTML=`<p class="${ok?'one':'zero'}" style="padding:10px;border-radius:10px">${ok?'Correcte':'No és correcte'}. ${GATES[q.g].sym}</p>`;setTimeout(()=>{idx++;show()},650)});$('#quizScore').textContent=`Puntuació: ${score}/${idx}`}$('#newQuiz').onclick=start}
function renderTeacher(){$('#teacher').innerHTML=`<div class="grid"><div class="card"><h2>Mode docent</h2><p>Genera material ràpid per classe, controla si es veuen les solucions i imprimeix fitxes.</p><label><input type="checkbox" id="solToggle" ${teacherSol?'checked':''} style="width:auto"> Mostrar solucions</label><label>Tipus de fitxa</label><select id="sheetType"><option value="truth">Completar taules de veritat</option><option value="gate">Identificar portes</option><option value="circuit">Interpretar circuits</option></select><div class="btns"><button class="btn" id="makeSheet">Genera fitxa</button><button class="btn secondary" onclick="printSheet()">Imprimir fitxa</button></div></div><div class="card" id="sheetCard" style="grid-column:1/-1"><h2>Fitxa generada</h2><div id="sheet"></div></div></div>`;$('#solToggle').onchange=e=>{teacherSol=e.target.checked};$('#makeSheet').onclick=()=>{let type=$('#sheetType').value;let html='<ol>';for(let i=0;i<8;i++){let q=makeQuestion();if(type==='truth')html+=`<li><strong>${GATES[q.g].txt}</strong>. Completa la taula de veritat.${teacherSol?tableHTML(q.g):'<br><br><br>'}</li>`;else if(type==='gate')html+=`<li>Quina porta té aquesta expressió? <span class="mono">${GATES[q.g].sym}</span>${teacherSol?` <strong>Solució: ${GATES[q.g].txt}</strong>`:''}</li>`;else html+=`<li>${q.text}${teacherSol?` <strong>Solució: ${q.ans}</strong>`:''}</li>`}$('#sheet').innerHTML=html+'</ol>'};$('#makeSheet').click()}
function printSheet(){document.body.classList.add('print-sheet');setTimeout(()=>window.print(),30)}
window.addEventListener('afterprint',()=>document.body.classList.remove('print-sheet'));
function copyText(t){navigator.clipboard?.writeText(t).then(()=>alert('Copiat')).catch(()=>alert('No s’ha pogut copiar'))}
function init(){tabsInit();renderSim();renderLearn();renderCircuit();renderExpr();renderKarnaugh();renderPractice();renderTeacher(); if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})}
init();
</script>
</body>
</html>
