.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:-24px}.tab{border:1px solid #ffffff66;background:white;border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px #1e3a8a1c}.tab.active{background:var(--b);color:white}.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 28px #1e3a8a12}.card h2,.card h3{margin:.1rem 0 .65rem}.small{color:var(--mut);font-size:.92rem}label{font-weight:800;display:block;margin:.5rem 0 .25rem}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#fff;font:inherit}textarea{min-height:78px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:0;border-radius:12px;background:var(--b);color:white;font-weight:900;padding:10px 12px;cursor:pointer}.btn.secondary{background:#e2e8f0;color:#111}.btn.warn{background:var(--warn);color:#111}.pill{display:inline-flex;gap:6px;align-items:center;border:1px solid var(--line);border-radius:999px;padding:6px 10px;margin:3px;background:#f8fbff;font-weight:800}.bitrow{display:flex;gap:10px;flex-wrap:wrap}.bit{min-width:74px;border:2px solid var(--line);border-radius:16px;background:#f8fbff;padding:10px;text-align:center;cursor:pointer}.bit strong{display:block;font-size:1.55rem}.bit.on{background:#dcfce7;border-color:#22c55e}.bit.off{background:#fee2e2;border-color:#ef4444}.out{font-size:2.2rem;font-weight:1000;text-align:center;border-radius:18px;padding:13px;background:#f8fbff;border:2px solid var(--line)}.out.on{background:#dcfce7;border-color:#22c55e;color:#166534}.out.off{background:#fee2e2;border-color:#ef4444;color:#991b1b}table{border-collapse:collapse;width:100%;font-size:.95rem}th,td{border:1px solid var(--line);padding:7px;text-align:center}th{background:#dbeafe}.one{background:#dcfce7;font-weight:900}.zero{background:#fee2e2;font-weight:900}.svgbox{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:8px;overflow:auto}.wire1{stroke:#16a34a!important;stroke-width:5}.wire0{stroke:#dc2626!important;stroke-width:4;stroke-dasharray:6 5}.gatebody{fill:#fff;stroke:#1d4ed8;stroke-width:3}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.steps{background:#f8fbff;border:1px solid var(--line);border-radius:14px;padding:10px;line-height:1.65}.footer{text-align:center;color:#64748b;padding:26px}.oktxt{color:#166534;font-weight:900}.badtxt{color:#991b1b;font-weight:900}.kmap{display:grid;grid-template-columns:48px repeat(4,1fr);gap:2px;max-width:560px}.kcell,.khead{min-height:42px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;background:#fff;font-weight:900}.khead{background:#dbeafe}.kcell.on{background:#dcfce7}.kcell.off{background:#fee2e2}.hidden{display:none!important}

<script>
'use strict';
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const tabs=[['sim','Simulador'],['circuit','Circuits configurables'],['truth2c','Taula → circuit'],['expr','Expressions'],['karnaugh','Karnaugh'],['practice','Pràctica'],['teacher','Docent']];
const GATES={AND:{n:2,txt:'AND',sym:'A · B',fn:a=>a.every(Boolean),desc:'1 només si totes les entrades són 1.'},OR:{n:2,txt:'OR',sym:'A + B',fn:a=>a.some(Boolean),desc:'1 si com a mínim una entrada és 1.'},NOT:{n:1,txt:'NOT',sym:'¬A',fn:a=>!a[0],desc:'Inverteix el valor.'},NAND:{n:2,txt:'NAND',sym:'¬(A · B)',fn:a=>!a.every(Boolean),desc:'Negació de l’AND.'},NOR:{n:2,txt:'NOR',sym:'¬(A + B)',fn:a=>!a.some(Boolean),desc:'Negació de l’OR.'},XOR:{n:2,txt:'XOR',sym:'A ⊕ B',fn:a=>a.filter(Boolean).length%2===1,desc:'1 si les entrades són diferents.'},XNOR:{n:2,txt:'XNOR',sym:'¬(A ⊕ B)',fn:a=>a.filter(Boolean).length%2===0,desc:'1 si les entrades són iguals.'},MAJ:{n:3,txt:'Majoritària',sym:'AB+AC+BC',fn:a=>a.filter(Boolean).length>=2,desc:'1 si la majoria d’entrades són 1.'}};
const gateKeys=Object.keys(GATES); const b=v=>v?1:0; const evalGate=(g,a)=>b(GATES[g].fn(a.map(Boolean))); const combos=n=>Array.from({length:2**n},(_,i)=>Array.from({length:n},(_,j)=>(i>>(n-1-j))&1));
function opt(sel,keys=gateKeys){return keys.map(k=>`<option value="${k}" ${sel===k?'selected':''}>${GATES[k].txt}</option>`).join('')}
function initTabs(){tabs.forEach(([id,t],i)=>$('#tabs').insertAdjacentHTML('beforeend',`<button class="tab ${i?'':'active'}" data-tab="${id}">${t}</button>`));$$('.tab').forEach(x=>x.onclick=()=>{$$('.tab').forEach(t=>t.classList.remove('active'));x.classList.add('active');$$('.panel').forEach(p=>p.classList.remove('active'));$('#'+x.dataset.tab).classList.add('active')})}
function base(g){return g==='NAND'?'AND':g==='NOR'?'OR':g==='XNOR'?'XOR':g} function neg(g){return ['NOT','NAND','NOR','XNOR'].includes(g)} function outX(g,x,w){return x+w+(neg(g)?24:0)}
function gateSVG(g,x,y,w,h){let bs=base(g),cy=y+h/2,bub=neg(g)?`<circle cx="${x+w+12}" cy="${cy}" r="10" fill="white" stroke="#1d4ed8" stroke-width="3"/>`:'';let lab=`<text x="${x+w/2}" y="${cy+7}" text-anchor="middle" font-size="18" font-weight="900" fill="#1d4ed8">${GATES[g].txt}</text>`;let sh='';if(bs==='NOT')sh=`<polygon points="${x},${y} ${x},${y+h} ${x+w},${cy}" class="gatebody"/>`;else if(bs==='AND')sh=`<path d="M ${x} ${y} L ${x+w*.52} ${y} Q ${x+w} ${y} ${x+w} ${cy} Q ${x+w} ${y+h} ${x+w*.52} ${y+h} L ${x} ${y+h} Z" class="gatebody"/>`;else if(bs==='OR')sh=`<path d="M ${x} ${y} C ${x+w*.42} ${y} ${x+w*.82} ${y+h*.05} ${x+w} ${cy} C ${x+w*.82} ${y+h*.95} ${x+w*.42} ${y+h} ${x} ${y+h} C ${x+w*.24} ${y+h*.68} ${x+w*.24} ${y+h*.32} ${x} ${y} Z" class="gatebody"/>`;else if(bs==='XOR')sh=`<path d="M ${x+12} ${y} C ${x+w*.42} ${y} ${x+w*.82} ${y+h*.05} ${x+w} ${cy} C ${x+w*.82} ${y+h*.95} ${x+w*.42} ${y+h} ${x+12} ${y+h} C ${x+w*.36} ${y+h*.66} ${x+w*.36} ${y+h*.34} ${x+12} ${y} Z" class="gatebody"/><path d="M ${x} ${y} C ${x+w*.25} ${y+h*.34} ${x+w*.25} ${y+h*.66} ${x} ${y+h}" fill="none" stroke="#1d4ed8" stroke-width="3"/>`;else sh=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="18" class="gatebody"/>`;return sh+bub+lab}
function tcell(v){return `<td class="${v?'one':'zero'}">${v}</td>`} function line(x1,y1,x2,y2,v){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${v?'wire1':'wire0'}"/>`}
function truthTableGate(g){let n=GATES[g].n, names=['A','B','C'].slice(0,n);return '<table><tr>'+names.map(x=>`<th>${x}</th>`).join('')+`<th>S ${GATES[g].txt}</th></tr>`+combos(n).map(r=>'<tr>'+r.map(tcell).join('')+tcell(evalGate(g,r))+'</tr>').join('')+'</table>'}
function renderSim(){let state={g:'AND',bits:[0,0,0]};$('#sim').innerHTML=`<div class="grid"><div class="card"><h2>Simulador de porta</h2><label>Porta</label><select id="sg">${opt('AND')}</select><div id="sbits" class="bitrow"></div><div class="btns"><button class="btn secondary" id="sRand">Valors aleatoris</button><button class="btn secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h2>Logigrama</h2><div id="ssvg" class="svgbox"></div><div id="sout" class="out">0</div><p id="sdesc" class="small"></p></div><div class="card" style="grid-column:1/-1"><h2>Taula de veritat</h2><div id="stbl"></div></div></div>`;function draw(){state.g=$('#sg').value;let n=GATES[state.g].n;$('#sbits').innerHTML=['A','B','C'].slice(0,n).map((x,i)=>`<button class="bit ${state.bits[i]?'on':'off'}" data-b="${i}"><span>${x}</span><strong>${state.bits[i]}</strong></button>`).join('');$$('[data-b]').forEach(bt=>bt.onclick=()=>{state.bits[+bt.dataset.b]^=1;draw()});let y1=n===1?95:70,y2=130,y3=170,out=evalGate(state.g,state.bits.slice(0,n));let gx=185,gy=52,w=125,h=100,go=outX(state.g,gx,w);let inputs=line(32,y1,gx,y1,state.bits[0])+(n>=2?line(32,y2,gx,y2,state.bits[1]):'')+(n>=3?line(32,y3,gx,y3,state.bits[2]):'');$('#ssvg').innerHTML=`<svg viewBox="0 0 520 220" width="100%" height="220">${inputs}${gateSVG(state.g,gx,gy,w,h)}${line(go,102,485,102,out)}<text x="36" y="${y1-10}">A=${state.bits[0]}</text>${n>=2?`<text x="36" y="${y2-10}">B=${state.bits[1]}</text>`:''}${n>=3?`<text x="36" y="${y3-10}">C=${state.bits[2]}</text>`:''}<text x="448" y="92" font-weight="900">S=${out}</text></svg>`;$('#sout').textContent=out;$('#sout').className='out '+(out?'on':'off');$('#sdesc').textContent=`S = ${GATES[state.g].sym}. ${GATES[state.g].desc}`;$('#stbl').innerHTML=truthTableGate(state.g)}$('#sg').onchange=draw;$('#sRand').onclick=()=>{state.bits=state.bits.map(()=>Math.random()<.5?0:1);draw()};draw()}
function circuitEval(cfg,A,B,C){let a=cfg.na?!A:A, bb=cfg.nb?!B:B, c=cfg.nc?!C:C;let X=evalGate(cfg.g1,[a,bb]); if(cfg.nx)X=b(!X);let Y=evalGate(cfg.g2,[X,c]); if(cfg.ny)Y=b(!Y);let S=cfg.final==='NOT'?b(!Y):Y; return {a,bb,c,X,Y,S}}
function exprCircuit(cfg){let A=cfg.na?'¬A':'A',B=cfg.nb?'¬B':'B',C=cfg.nc?'¬C':'C';let X=`${GATES[cfg.g1].txt}(${A},${B})`;if(cfg.nx)X=`¬(${X})`;let Y=`${GATES[cfg.g2].txt}(${X},${C})`;if(cfg.ny)Y=`¬(${Y})`;return cfg.final==='NOT'?`S = ¬(${Y})`:`S = ${Y}`}
function renderCircuit(){let bits=[1,0,1];$('#circuit').innerHTML=`<div class="grid"><div class="card"><h2>Circuits configurables</h2><label>Porta 1: A/B → X</label><select id="cg1">${opt('AND',gateKeys.filter(k=>GATES[k].n===2))}</select><label>Porta 2: X/C → Y</label><select id="cg2">${opt('OR',gateKeys.filter(k=>GATES[k].n===2))}</select><label><input type="checkbox" id="cna" style="width:auto"> NOT a l'entrada A</label><label><input type="checkbox" id="cnb" style="width:auto"> NOT a l'entrada B</label><label><input type="checkbox" id="cnc" style="width:auto"> NOT a l'entrada C</label><label><input type="checkbox" id="cnx" style="width:auto"> NOT després de X</label><label><input type="checkbox" id="cny" style="width:auto"> NOT després de Y</label><label>Sortida final</label><select id="cfinal"><option value="DIRECT">Directa: S = Y</option><option value="NOT">Amb NOT final: S = ¬Y</option></select><label>Entrades per simular</label><div id="cbits" class="bitrow"></div><div class="btns"><button class="btn secondary" id="cRandom">Valors aleatoris</button><button class="btn secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h2>Logigrama</h2><div id="csvg" class="svgbox"></div><div id="csteps" class="steps"></div></div><div class="card" style="grid-column:1/-1"><h2>Taula de veritat del circuit</h2><div id="ctbl"></div></div></div>`;function cfg(){return{g1:$('#cg1').value,g2:$('#cg2').value,na:$('#cna').checked,nb:$('#cnb').checked,nc:$('#cnc').checked,nx:$('#cnx').checked,ny:$('#cny').checked,final:$('#cfinal').value}}function draw(){let c=cfg(),r=circuitEval(c,bits[0],bits[1],bits[2]);$('#cbits').innerHTML=['A','B','C'].map((x,i)=>`<button class="bit ${bits[i]?'on':'off'}" data-cb="${i}"><span>${x}</span><strong>${bits[i]}</strong></button>`).join('');$$('[data-cb]').forEach(bt=>bt.onclick=()=>{bits[+bt.dataset.cb]^=1;draw()});let g1x=132,g1y=38,g2x=380,g2y=90,w=112,h=92,g1o=outX(c.g1,g1x,w),g2o=outX(c.g2,g2x,w),fo=c.final==='NOT'?650:555;let svg=`<svg viewBox="0 0 760 290" width="100%" height="290"><text x="380" y="24" text-anchor="middle" font-size="15" font-weight="900">${exprCircuit(c)}</text>`;svg+=line(25,70,g1x,70,bits[0]);svg+=line(25,112,g1x,112,bits[1]);svg+=gateSVG(c.g1,g1x,g1y,w,h);svg+=line(g1o,84,g2x,118,r.X);svg+=line(25,220,g2x,160,bits[2]);svg+=gateSVG(c.g2,g2x,g2y,w,h);svg+=line(g2o,136,c.final==='NOT'?610:720,136,r.Y);if(c.final==='NOT'){svg+=gateSVG('NOT',610,98,70,76);svg+=line(704,136,735,136,r.S)}svg+=`<text x="28" y="60">A=${bits[0]}${c.na?' → ¬A='+r.a:''}</text><text x="28" y="104">B=${bits[1]}${c.nb?' → ¬B='+r.bb:''}</text><text x="28" y="210">C=${bits[2]}${c.nc?' → ¬C='+r.c:''}</text><text x="286" y="78" font-weight="900">X=${r.X}</text><text x="550" y="122" font-weight="900">Y=${r.Y}</text><text x="715" y="122" font-weight="900">S=${r.S}</text></svg>`;$('#csvg').innerHTML=svg;$('#csteps').innerHTML=`<strong>Expressió:</strong> <span class="mono">${exprCircuit(c)}</span><br><strong>Pas 1:</strong> X = ${GATES[c.g1].txt}(${c.na?'¬A':'A'}, ${c.nb?'¬B':'B'}) = ${r.X}<br><strong>Pas 2:</strong> Y = ${GATES[c.g2].txt}(${c.nx?'¬X':'X'}, ${c.nc?'¬C':'C'}) = ${r.Y}<br><strong>Pas 3:</strong> S = ${c.final==='NOT'?'¬Y':'Y'} = ${r.S}`;let rows=combos(3).map(v=>{let rr=circuitEval(c,v[0],v[1],v[2]);return [...v,rr.X,rr.Y,rr.S]});$('#ctbl').innerHTML='<table><tr><th>A</th><th>B</th><th>C</th><th>X</th><th>Y</th><th>S</th></tr>'+rows.map(row=>'<tr>'+row.map(tcell).join('')+'</tr>').join('')+'</table>'}['cg1','cg2','cna','cnb','cnc','cnx','cny','cfinal'].forEach(id=>$('#'+id).onchange=draw);$('#cRandom').onclick=()=>{bits=bits.map(()=>Math.random()<.5?0:1);draw()};draw()}
function renderTruth2Circuit(){let vals=[0,0,0,0];$('#truth2c').innerHTML=`<div class="grid"><div class="card"><h2>De taula a porta</h2><p class="small">Marca la sortida S per a A/B. L'app intenta reconèixer la porta equivalent.</p><div id="ttcTable"></div><div class="btns"><button class="btn secondary" id="ttcClear">Neteja</button></div></div><div class="card"><h2>Resultat</h2><div id="ttcOut" class="steps"></div></div></div>`;function draw(){let rows=combos(2);$('#ttcTable').innerHTML='<table><tr><th>A</th><th>B</th><th>S</th></tr>'+rows.map((r,i)=>`<tr>${r.map(tcell).join('')}<td><button class="bit ${vals[i]?'on':'off'}" data-tv="${i}"><strong>${vals[i]}</strong></button></td></tr>`).join('')+'</table>';$$('[data-tv]').forEach(bt=>bt.onclick=()=>{vals[+bt.dataset.tv]^=1;draw()});let pat=vals.join('');let found={'0001':'AND','0111':'OR','1110':'NAND','1000':'NOR','0110':'XOR','1001':'XNOR'}[pat];let sop=vals.map((v,i)=>v?min2(i):null).filter(Boolean).join(' + ')||'0';$('#ttcOut').innerHTML=found?`<p><strong>Porta detectada:</strong> ${GATES[found].txt}</p><p><strong>Expressió:</strong> <span class="mono">S = ${GATES[found].sym}</span></p>${truthTableGate(found)}`:`<p>No correspon a una porta bàsica única.</p><p><strong>Forma canònica:</strong> <span class="mono">S = ${sop}</span></p>`}function min2(i){let r=combos(2)[i];return `${r[0]?'A':'¬A'}·${r[1]?'B':'¬B'}`}$('#ttcClear').onclick=()=>{vals=[0,0,0,0];draw()};draw()}
function safeExpr(expr,A,B,C){let e=expr.replace(/\s+/g,'').replace(/¬/g,'!').replace(/·/g,'&').replace(/\+/g,'|').replace(/⊕/g,'^');if(!/^[ABC01!&|^()]+$/i.test(e))throw Error('bad');e=e.replace(/A/gi,A?'1':'0').replace(/B/gi,B?'1':'0').replace(/C/gi,C?'1':'0');return b(Function(`return Boolean(${e})`)())}
function renderExpr(){ $('#expr').innerHTML=`<div class="grid"><div class="card"><h2>Expressió → taula de veritat</h2><p class="small">Operadors: ! o ¬, & o ·, | o +, ^ per XOR.</p><textarea id="exIn">(A & B) | !C</textarea><div class="btns"><button class="btn" id="exBtn">Genera taula</button><button class="btn secondary" onclick="navigator.clipboard.writeText(document.querySelector('#exOut').innerText)">Copiar</button></div></div><div class="card"><h2>Resultat</h2><div id="exOut"></div></div></div>`;$('#exBtn').onclick=()=>{try{let e=$('#exIn').value;let rows=combos(3).map(r=>[...r,safeExpr(e,r[0],r[1],r[2])]);$('#exOut').innerHTML='<table><tr><th>A</th><th>B</th><th>C</th><th>S</th></tr>'+rows.map(r=>'<tr>'+r.map(tcell).join('')+'</tr>').join('')+'</table>'}catch(err){$('#exOut').innerHTML='<p class="badtxt">Expressió no vàlida.</p>'}};$('#exBtn').click()}
function renderKarnaugh(){let vals=Array(16).fill(0),gray=['00','01','11','10'];$('#karnaugh').innerHTML=`<div class="grid"><div class="card"><h2>Karnaugh 4 variables</h2><p class="small">Toca les cel·les. Mostra la forma canònica i una guia d'agrupació.</p><div id="kmap"></div><div class="btns"><button class="btn secondary" id="kClear">Neteja</button></div></div><div class="card"><h2>Guia</h2><div id="kOut" class="steps"></div></div></div>`;function mt(i){let s=i.toString(2).padStart(4,'0'),n=['A','B','C','D'];return s.split('').map((x,j)=>x==='1'?n[j]:'¬'+n[j]).join('·')}function draw(){let html='<div class="kmap"><div class="khead">AB\\CD</div>'+gray.map(x=>`<div class="khead">${x}</div>`).join('');gray.forEach(ab=>{html+=`<div class="khead">${ab}</div>`;gray.forEach(cd=>{let i=parseInt(ab+cd,2);html+=`<button class="kcell ${vals[i]?'on':'off'}" data-k="${i}">${vals[i]}</button>`})});html+='</div>';$('#kmap').innerHTML=html;$$('[data-k]').forEach(x=>x.onclick=()=>{vals[+x.dataset.k]^=1;draw()});let mins=vals.map((v,i)=>v?i:null).filter(x=>x!==null);$('#kOut').innerHTML=mins.length?`<strong>1 marcats:</strong> Σm(${mins.join(', ')})<br><strong>Forma canònica:</strong><br><span class="mono">${mins.map(mt).join(' + ')}</span><hr><strong>Passos:</strong><br>1. Agrupa els 1 en blocs de 1, 2, 4 o 8.<br>2. Dona prioritat als grups més grans.<br>3. Les variables que canvien dins el grup desapareixen.`:'S = 0'}$('#kClear').onclick=()=>{vals.fill(0);draw()};draw()}
function makeQ(level){let gs=gateKeys, g=gs[Math.floor(Math.random()*gs.length)], n=GATES[g].n, c=combos(n)[Math.floor(Math.random()*2**n)], ans=evalGate(g,c); if(level==='N3'){return{txt:`Interpreta: en un circuit ${GATES[g].txt}, ${['A','B','C'].slice(0,n).map((x,i)=>x+'='+c[i]).join(', ')}. Quina és S?`,ans}} if(level==='N4'){return{txt:`Disseny ràpid: quina porta dona S=1 quan ${n===2?'A i B són diferents':'com a mínim dues entrades són 1'}?`,choices:n===2?['XOR','AND','OR']:['Majoritària','AND','NOT'],ansText:n===2?'XOR':'Majoritària'}} return{txt:`Calcula ${GATES[g].txt} amb ${['A','B','C'].slice(0,n).map((x,i)=>x+'='+c[i]).join(', ')}.`,ans}}
function renderPractice(){let qs=[],i=0,score=0;$('#practice').innerHTML=`<div class="grid"><div class="card"><h2>Pràctica per nivells</h2><label>Nivell</label><select id="plevel"><option>N1</option><option>N2</option><option>N3</option><option>N4</option></select><label>Nombre de preguntes</label><select id="pnum"><option>5</option><option selected>10</option><option>15</option></select><div class="btns"><button class="btn" id="pStart">Comença</button></div><div id="pBox"></div></div><div class="card"><h2>Resultat</h2><div id="pScore" class="score">Encara no iniciat</div><div class="steps"><strong>N1/N2</strong>: calcular sortides.<br><strong>N3</strong>: interpretar circuits.<br><strong>N4</strong>: dissenyar la funció.</div></div></div>`;function start(){qs=Array.from({length:+$('#pnum').value},()=>makeQ($('#plevel').value));i=0;score=0;show()}function show(){if(i>=qs.length){$('#pBox').innerHTML='<h3>Finalitzat</h3>';$('#pScore').textContent=`${score}/${qs.length}`;return}let q=qs[i]; if(q.choices){$('#pBox').innerHTML=`<p><strong>${i+1}/${qs.length}</strong> ${q.txt}</p><div class="btns">${q.choices.map(c=>`<button class="btn secondary" data-ch="${c}">${c}</button>`).join('')}</div><div id="pfb"></div>`;$$('[data-ch]').forEach(bt=>bt.onclick=()=>{let ok=bt.dataset.ch===q.ansText;if(ok)score++;$('#pfb').innerHTML=ok?'<p class="oktxt">Correcte.</p>':'<p class="badtxt">No és correcte.</p>';setTimeout(()=>{i++;show()},700)})}else{$('#pBox').innerHTML=`<p><strong>${i+1}/${qs.length}</strong> ${q.txt}</p><div class="btns"><button class="btn" data-a="1">S = 1</button><button class="btn secondary" data-a="0">S = 0</button></div><div id="pfb"></div>`;$$('[data-a]').forEach(bt=>bt.onclick=()=>{let ok=+bt.dataset.a===q.ans;if(ok)score++;$('#pfb').innerHTML=ok?'<p class="oktxt">Correcte.</p>':'<p class="badtxt">Revisa la taula de veritat.</p>';setTimeout(()=>{i++;show()},700)})}$('#pScore').textContent=`${score}/${i}`};$('#pStart').onclick=start}
function renderTeacher(){let includeSol=true;$('#teacher').innerHTML=`<div class="grid"><div class="card"><h2>Mode docent</h2><label>Tipus de fitxa</label><select id="sheetType"><option value="truth">Taules de veritat</option><option value="circuit">Circuits configurables</option><option value="exam">Mode examen ràpid</option></select><label><input type="checkbox" id="incTheory" style="width:auto" checked> Incloure teoria curta</label><label><input type="checkbox" id="incSol" style="width:auto" checked> Incloure solucions</label><label>Preguntes</label><select id="sheetN"><option>5</option><option selected>10</option><option>15</option></select><div class="btns"><button class="btn" id="makeSheet">Genera fitxa</button><button class="btn secondary" onclick="printSheet()">Imprimir només la fitxa</button></div></div><div class="card" id="sheetCard" style="grid-column:1/-1"><h2>Fitxa generada</h2><div id="sheet"></div></div></div>`;function make(){let typ=$('#sheetType').value,n=+$('#sheetN').value,sol=$('#incSol').checked,theory=$('#incTheory').checked;let html=theory?'<p><strong>Recordatori:</strong> AND exigeix totes les entrades a 1; OR exigeix com a mínim una entrada; NOT inverteix; XOR detecta entrades diferents.</p>':'';html+='<ol>';for(let j=0;j<n;j++){let q=makeQ(typ==='exam'?'N3':'N2');if(typ==='truth'){let g=gateKeys[Math.floor(Math.random()*gateKeys.length)];html+=`<li>Completa la taula de veritat de la porta <strong>${GATES[g].txt}</strong>.${sol?truthTableGate(g):'<br><br><br><br>'}</li>`}else if(typ==='circuit'){html+=`<li>Dibuixa o interpreta el circuit: <span class="mono">S = ¬(OR(AND(A,B),C))</span>.${sol?'<br><strong>Ajuda:</strong> calcula primer X=AND(A,B), després Y=OR(X,C), finalment S=¬Y.':''}</li>`}else html+=`<li>${q.txt}${sol?` <strong>Solució: ${q.ans}</strong>`:''}</li>`}$('#sheet').innerHTML=html+'</ol>'}$('#makeSheet').onclick=make;make()}
function printSheet(){document.body.classList.add('print-sheet');setTimeout(()=>window.print(),30)}window.addEventListener('afterprint',()=>document.body.classList.remove('print-sheet'));
function init(){initTabs();renderSim();renderCircuit();renderTruth2Circuit();renderExpr();renderKarnaugh();renderPractice();renderTeacher();if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{})}init();
</script>
