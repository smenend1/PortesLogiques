<!doctype html>
<html lang="ca">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portes Lògiques Plus v3.2</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1d4ed8">
<style>
:root{--bg:#eef5ff;--card:#fff;--ink:#0f172a;--mut:#64748b;--line:#cbd5e1;--blue:#1d4ed8;--blue2:#2563eb;--ok:#16a34a;--bad:#dc2626;--soft:#dbeafe;--warn:#f59e0b}
body.dark{--bg:#0f172a;--card:#172033;--ink:#e5eefc;--mut:#a7b2c7;--line:#334155;--soft:#1e3a8a}
*{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:linear-gradient(180deg,var(--bg),#f8fbff);color:var(--ink)} body.dark{background:#0f172a}
header{background:linear-gradient(135deg,#1d4ed8,#0f172a);color:#fff;padding:18px 16px 28px} header h1{margin:0;font-size:1.55rem} header p{margin:.35rem 0 0;opacity:.92}
.wrap{max-width:1180px;margin:auto;padding:14px}.topbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between}.status{padding:8px 12px;border-radius:999px;background:#ecfeff;color:#155e75;font-weight:800}.status.err{background:#fee2e2;color:#991b1b}.status.ok{background:#dcfce7;color:#166534}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-top:-24px}.tab{border:1px solid #ffffff66;background:#fff;border-radius:14px;padding:10px 12px;font-weight:800;cursor:pointer;box-shadow:0 8px 20px #1e3a8a1c}.tab.active{background:var(--blue);color:#fff}
.panel{display:none}.panel.active{display:block}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 8px 28px #1e3a8a12}.card h2,.card h3{margin:.1rem 0 .65rem}.small{color:var(--mut);font-size:.92rem}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}label{font-weight:800;display:block;margin:.55rem 0 .25rem}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:var(--card);color:var(--ink);font:inherit}textarea{min-height:76px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.btn{border:0;border-radius:12px;background:var(--blue);color:white;font-weight:900;padding:10px 12px;cursor:pointer}.btn.secondary{background:#e2e8f0;color:#111}.btn.warn{background:var(--warn);color:#111}.btn.bad{background:var(--bad)}
.bitrow{display:flex;gap:10px;flex-wrap:wrap}.bit{min-width:74px;border:2px solid var(--line);border-radius:16px;background:#f8fbff;padding:10px;text-align:center;cursor:pointer}.bit strong{display:block;font-size:1.55rem}.bit.on{background:#dcfce7;border-color:#22c55e}.bit.off{background:#fee2e2;border-color:#ef4444}.out{font-size:2.1rem;font-weight:1000;text-align:center;border-radius:18px;padding:13px;background:#f8fbff;border:2px solid var(--line)}.out.on{background:#dcfce7;border-color:#22c55e;color:#166534}.out.off{background:#fee2e2;border-color:#ef4444;color:#991b1b}
table{border-collapse:collapse;width:100%;font-size:.95rem}th,td{border:1px solid var(--line);padding:7px;text-align:center}th{background:var(--soft)}.one{background:#dcfce7;color:#166534;font-weight:900}.zero{background:#fee2e2;color:#991b1b;font-weight:900}.steps{background:#f8fbff;color:#0f172a;border:1px solid var(--line);border-radius:14px;padding:10px;line-height:1.65}.dark .steps{background:#111827;color:#e5eefc}.svgbox{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:8px;overflow:auto}.wire1{stroke:#16a34a!important;stroke-width:5}.wire0{stroke:#dc2626!important;stroke-width:4;stroke-dasharray:6 5}.gatebody{fill:white;stroke:#1d4ed8;stroke-width:3}.kmap{display:grid;grid-template-columns:58px repeat(4,1fr);gap:2px;max-width:580px}.kcell,.khead{min-height:42px;border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--card);font-weight:900}.khead{background:var(--soft)}.kcell.on{background:#dcfce7;color:#166534}.kcell.off{background:#fee2e2;color:#991b1b}.footer{text-align:center;color:var(--mut);padding:26px}.oktxt{color:#166534;font-weight:900}.badtxt{color:#991b1b;font-weight:900}.hidden{display:none!important}.notice{background:#fff7ed;border:1px solid #fed7aa;border-radius:14px;padding:10px;color:#9a3412}.dark .notice{background:#422006;color:#fed7aa;border-color:#9a3412}
@media print{header,.tabs,.btns,.no-print,.footer,#errorBox{display:none!important}body{background:white;color:#111}.panel{display:none!important}.panel.active{display:block!important}.card{box-shadow:none;break-inside:avoid}body.print-sheet .panel{display:none!important}body.print-sheet #teacher{display:block!important}body.print-sheet #teacher .card{display:none!important}body.print-sheet #sheetCard{display:block!important;border:0}}
</style>
</head>
<body>
<header><div class="wrap"><div class="topbar"><div><h1>Portes Lògiques Plus v3.2</h1><p>Laboratori visual estable: simulador, circuits configurables, taules automàtiques, pràctica i fitxes docents.</p></div><span id="appStatus" class="status">Carregant...</span></div></div></header>
<main class="wrap">
<div id="errorBox" class="notice hidden"><strong>S'ha detectat un error.</strong><div id="errorText" class="mono"></div><div class="btns"><button class="btn warn" id="reloadBtn">Recarrega</button><button class="btn bad" id="resetBtn">Neteja memòria cau</button></div></div>
<nav class="tabs no-print" id="tabs"></nav>
<section id="sim" class="panel active"></section>
<section id="circuit" class="panel"></section>
<section id="truth2c" class="panel"></section>
<section id="expr" class="panel"></section>
<section id="karnaugh" class="panel"></section>
<section id="practice" class="panel"></section>
<section id="teacher" class="panel"></section>
<section id="help" class="panel"></section>
</main>
<div class="footer">PWA instal·lable · Versió v3.2 · Estabilitat i aula.</div>
<script>
'use strict';
(function(){
const VERSION='v3.2';
const $=s=>document.querySelector(s); const $$=s=>Array.from(document.querySelectorAll(s));
const tabs=[['sim','Simulador'],['circuit','Circuits'],['truth2c','Taula → porta'],['expr','Expressions'],['karnaugh','Karnaugh'],['practice','Pràctica'],['teacher','Docent'],['help','Ajuda']];
const GATES={
 AND:{n:2,txt:'AND',sym:'A · B',fn:a=>a.every(Boolean),desc:'La sortida és 1 només si totes les entrades són 1.'},
 OR:{n:2,txt:'OR',sym:'A + B',fn:a=>a.some(Boolean),desc:'La sortida és 1 si com a mínim una entrada és 1.'},
 NOT:{n:1,txt:'NOT',sym:'¬A',fn:a=>!a[0],desc:'Inverteix el valor de l’entrada.'},
 NAND:{n:2,txt:'NAND',sym:'¬(A · B)',fn:a=>!a.every(Boolean),desc:'És la negació de l’AND.'},
 NOR:{n:2,txt:'NOR',sym:'¬(A + B)',fn:a=>!a.some(Boolean),desc:'És la negació de l’OR.'},
 XOR:{n:2,txt:'XOR',sym:'A ⊕ B',fn:a=>a.filter(Boolean).length%2===1,desc:'La sortida és 1 si les entrades són diferents.'},
 XNOR:{n:2,txt:'XNOR',sym:'¬(A ⊕ B)',fn:a=>a.filter(Boolean).length%2===0,desc:'La sortida és 1 si les entrades són iguals.'},
 MAJ:{n:3,txt:'Majoritària',sym:'AB + AC + BC',fn:a=>a.filter(Boolean).length>=2,desc:'La sortida és 1 si la majoria d’entrades són 1.'}
};
const gateKeys=Object.keys(GATES); const twoGateKeys=gateKeys.filter(g=>GATES[g].n===2); const bit=v=>v?1:0;
function setStatus(txt,cls){const el=$('#appStatus'); el.textContent=txt; el.className='status '+(cls||'');}
function showError(msg){$('#errorText').textContent=String(msg); $('#errorBox').classList.remove('hidden'); setStatus('Error detectat','err');}
window.onerror=(m,u,l,c)=>{showError(m+' (línia '+l+')'); return false;};
window.addEventListener('unhandledrejection',e=>showError(e.reason||'Error no capturat'));
function combos(n){return Array.from({length:2**n},(_,i)=>Array.from({length:n},(_,j)=>(i>>(n-1-j))&1));}
function evalGate(g,a){return bit(GATES[g].fn(a.map(Boolean)));}
function opt(sel,keys=gateKeys){return keys.map(k=>`<option value="${k}" ${k===sel?'selected':''}>${GATES[k].txt}</option>`).join('');}
function tcell(v){return `<td class="${v?'one':'zero'}">${v}</td>`;}
function truthTableGate(g){const n=GATES[g].n, names=['A','B','C'].slice(0,n);return `<table><tr>${names.map(x=>`<th>${x}</th>`).join('')}<th>S ${GATES[g].txt}</th></tr>`+combos(n).map(r=>`<tr>${r.map(tcell).join('')}${tcell(evalGate(g,r))}</tr>`).join('')+'</table>';}
function line(x1,y1,x2,y2,v){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" class="${v?'wire1':'wire0'}"/>`;}
function base(g){return g==='NAND'?'AND':g==='NOR'?'OR':g==='XNOR'?'XOR':g;} function neg(g){return ['NOT','NAND','NOR','XNOR'].includes(g);} function outX(g,x,w){return x+w+(neg(g)?24:0);}
function gateSVG(g,x,y,w,h){let bs=base(g),cy=y+h/2,bub=neg(g)?`<circle cx="${x+w+12}" cy="${cy}" r="10" fill="white" stroke="#1d4ed8" stroke-width="3"/>`:'';let lab=`<text x="${x+w/2}" y="${cy+7}" text-anchor="middle" font-size="17" font-weight="900" fill="#1d4ed8">${GATES[g].txt}</text>`;let sh='';if(bs==='NOT')sh=`<polygon points="${x},${y} ${x},${y+h} ${x+w},${cy}" class="gatebody"/>`;else if(bs==='AND')sh=`<path d="M ${x} ${y} L ${x+w*.52} ${y} Q ${x+w} ${y} ${x+w} ${cy} Q ${x+w} ${y+h} ${x+w*.52} ${y+h} L ${x} ${y+h} Z" class="gatebody"/>`;else if(bs==='OR')sh=`<path d="M ${x} ${y} C ${x+w*.42} ${y} ${x+w*.82} ${y+h*.05} ${x+w} ${cy} C ${x+w*.82} ${y+h*.95} ${x+w*.42} ${y+h} ${x} ${y+h} C ${x+w*.24} ${y+h*.68} ${x+w*.24} ${y+h*.32} ${x} ${y} Z" class="gatebody"/>`;else if(bs==='XOR')sh=`<path d="M ${x+12} ${y} C ${x+w*.42} ${y} ${x+w*.82} ${y+h*.05} ${x+w} ${cy} C ${x+w*.82} ${y+h*.95} ${x+w*.42} ${y+h} ${x+12} ${y+h} C ${x+w*.36} ${y+h*.66} ${x+w*.36} ${y+h*.34} ${x+12} ${y} Z" class="gatebody"/><path d="M ${x} ${y} C ${x+w*.25} ${y+h*.34} ${x+w*.25} ${y+h*.66} ${x} ${y+h}" fill="none" stroke="#1d4ed8" stroke-width="3"/>`;else sh=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="18" class="gatebody"/>`;return sh+bub+lab;}
function initTabs(){const nav=$('#tabs'); nav.innerHTML=''; tabs.forEach(([id,t],i)=>nav.insertAdjacentHTML('beforeend',`<button class="tab ${i?'':'active'}" data-tab="${id}">${t}</button>`)); $$('.tab').forEach(btn=>btn.onclick=()=>{localStorage.setItem('plog-tab',btn.dataset.tab); $$('.tab').forEach(x=>x.classList.remove('active')); btn.classList.add('active'); $$('.panel').forEach(p=>p.classList.remove('active')); $('#'+btn.dataset.tab).classList.add('active');}); const saved=localStorage.getItem('plog-tab'); if(saved && $('#'+saved)){document.querySelector(`[data-tab="${saved}"]`)?.click();}}
function renderSim(){let state={g:localStorage.getItem('plog-gate')||'AND',bits:[0,0,0]}; $('#sim').innerHTML=`<div class="grid"><div class="card"><h2>Simulador</h2><p class="small">Tria una porta i toca les entrades. La taula es redibuixa sola.</p><label>Porta</label><select id="sg">${opt(state.g)}</select><div id="sbits" class="bitrow"></div><div class="btns"><button class="btn secondary" id="sRand">Valors aleatoris</button><button class="btn secondary" id="sClear">Posa a 0</button><button class="btn secondary" onclick="window.print()">Imprimir</button></div></div><div class="card"><h2>Logigrama</h2><div id="ssvg" class="svgbox"></div><div id="sout" class="out">0</div><p id="sdesc" class="small"></p></div><div class="card" style="grid-column:1/-1"><h2>Taula de veritat</h2><div id="stbl"></div></div></div>`;
 function draw(){state.g=$('#sg').value; localStorage.setItem('plog-gate',state.g); const n=GATES[state.g].n; $('#sbits').innerHTML=['A','B','C'].slice(0,n).map((x,i)=>`<button class="bit ${state.bits[i]?'on':'off'}" data-bit="${i}"><span>${x}</span><strong>${state.bits[i]}</strong></button>`).join(''); $$('[data-bit]').forEach(bt=>bt.onclick=()=>{state.bits[+bt.dataset.bit]^=1; draw();}); const out=evalGate(state.g,state.bits.slice(0,n)); const gx=185,gy=55,w=125,h=100,go=outX(state.g,gx,w); const ys=n===1?[105]:n===2?[80,130]:[65,110,155]; let wires=''; ys.forEach((y,i)=>wires+=line(35,y,gx,y,state.bits[i])); $('#ssvg').innerHTML=`<svg viewBox="0 0 530 220" width="100%" height="220">${wires}${gateSVG(state.g,gx,gy,w,h)}${line(go,105,495,105,out)}${ys.map((y,i)=>`<text x="38" y="${y-10}"> ${['A','B','C'][i]}=${state.bits[i]}</text>`).join('')}<text x="500" y="95" font-weight="900">S</text></svg>`; $('#sout').className='out '+(out?'on':'off'); $('#sout').textContent='S = '+out; $('#sdesc').textContent=GATES[state.g].desc+' Expressió: S = '+GATES[state.g].sym; $('#stbl').innerHTML=truthTableGate(state.g); }
 $('#sg').onchange=draw; $('#sRand').onclick=()=>{state.bits=state.bits.map(()=>Math.random()<.5?0:1); draw();}; $('#sClear').onclick=()=>{state.bits=[0,0,0]; draw();}; draw();}
function circuitConfig(){return {g1:$('#cg1').value,g2:$('#cg2').value,na:$('#cna').checked,nb:$('#cnb').checked,nc:$('#cnc').checked,nx:$('#cnx').checked,ny:$('#cny').checked,final:$('#cfinal').checked};}
function circuitEval(c,A,B,C){let a=c.na?1-A:A, bb=c.nb?1-B:B, cc=c.nc?1-C:C; let X=evalGate(c.g1,[a,bb]); let xin=c.nx?1-X:X; let Y=evalGate(c.g2,[xin,cc]); let yy=c.ny?1-Y:Y; let S=c.final?1-yy:yy; return {a,bb,cc,X,xin,Y,yy,S};}
function exprCircuit(c){let A=c.na?'¬A':'A',B=c.nb?'¬B':'B',C=c.nc?'¬C':'C'; let X=`${GATES[c.g1].txt}(${A},${B})`; if(c.nx)X='¬('+X+')'; let Y=`${GATES[c.g2].txt}(${X},${C})`; if(c.ny)Y='¬('+Y+')'; return 'S = '+(c.final?'¬('+Y+')':Y);}
function renderCircuit(){let bits=[1,0,1]; $('#circuit').innerHTML=`<div class="grid"><div class="card"><h2>Circuits configurables</h2><label>Porta 1: A/B → X</label><select id="cg1">${opt('AND',twoGateKeys)}</select><label>Porta 2: X/C → Y</label><select id="cg2">${opt('OR',twoGateKeys)}</select><label><input id="cna" type="checkbox" style="width:auto"> NOT abans d'A</label><label><input id="cnb" type="checkbox" style="width:auto"> NOT abans de B</label><label><input id="cnx" type="checkbox" style="width:auto"> NOT després de X</label><label><input id="cnc" type="checkbox" style="width:auto"> NOT abans de C</label><label><input id="cny" type="checkbox" style="width:auto"> NOT després de Y</label><label><input id="cfinal" type="checkbox" style="width:auto" checked> NOT final</label><div class="bitrow" id="cbits"></div><div class="btns"><button class="btn secondary" id="cRand">Valors aleatoris</button></div></div><div class="card"><h2>Logigrama</h2><div id="csvg" class="svgbox"></div><div id="csteps" class="steps"></div></div><div class="card" style="grid-column:1/-1"><h2>Taula de veritat del circuit</h2><div id="ctbl"></div></div></div>`;
 function draw(){ $('#cbits').innerHTML=['A','B','C'].map((x,i)=>`<button class="bit ${bits[i]?'on':'off'}" data-cbit="${i}"><span>${x}</span><strong>${bits[i]}</strong></button>`).join(''); $$('[data-cbit]').forEach(bt=>bt.onclick=()=>{bits[+bt.dataset.cbit]^=1; draw();}); const c=circuitConfig(), r=circuitEval(c,bits[0],bits[1],bits[2]); let svg=`<svg viewBox="0 0 760 260" width="100%" height="260">`;
 svg+=line(30,65,150,65,r.a)+line(30,115,150,115,r.bb)+line(30,195,395,195,r.cc); svg+=`<text x="35" y="53">A=${bits[0]}${c.na?'→¬A='+r.a:''}</text><text x="35" y="105">B=${bits[1]}${c.nb?'→¬B='+r.bb:''}</text><text x="35" y="185">C=${bits[2]}${c.nc?'→¬C='+r.cc:''}</text>`; svg+=gateSVG(c.g1,150,50,115,80)+line(outX(c.g1,150,115),90,395,90,r.X); svg+=`<text x="300" y="80" font-weight="900">X=${r.X}${c.nx?' → ¬X='+r.xin:''}</text>`; svg+=line(395,90,395,125,r.xin)+line(395,195,395,155,r.cc); svg+=gateSVG(c.g2,395,110,115,80)+line(outX(c.g2,395,115),150,650,150,r.Y); svg+=`<text x="542" y="138" font-weight="900">Y=${r.Y}${c.ny?' → ¬Y='+r.yy:''}</text>`; if(c.final){svg+=gateSVG('NOT',650,125,70,50)+line(outX('NOT',650,70),150,742,150,r.S);} else {svg+=line(650,150,742,150,r.S);} svg+=`<text x="704" y="120" font-weight="900">S=${r.S}</text></svg>`; $('#csvg').innerHTML=svg; $('#csteps').innerHTML=`<strong>Expressió:</strong> <span class="mono">${exprCircuit(c)}</span><br><strong>Amb els valors actuals:</strong> X=${r.X}, Y=${r.Y}, S=${r.S}`; const rows=combos(3).map(v=>{const rr=circuitEval(c,v[0],v[1],v[2]); return [...v,rr.X,rr.Y,rr.S];}); $('#ctbl').innerHTML='<table><tr><th>A</th><th>B</th><th>C</th><th>X</th><th>Y</th><th>S</th></tr>'+rows.map(row=>'<tr>'+row.map(tcell).join('')+'</tr>').join('')+'</table>'; }
 ['cg1','cg2','cna','cnb','cnc','cnx','cny','cfinal'].forEach(id=>$('#'+id).onchange=draw); $('#cRand').onclick=()=>{bits=bits.map(()=>Math.random()<.5?0:1); draw();}; draw();}
function renderTruth2Circuit(){let vals=[0,0,0,0]; $('#truth2c').innerHTML=`<div class="grid"><div class="card"><h2>Taula → porta</h2><p class="small">Marca la sortida S per a A/B. L'app intenta reconèixer la porta equivalent.</p><div id="ttcTable"></div><div class="btns"><button class="btn secondary" id="ttcClear">Neteja</button></div></div><div class="card"><h2>Resultat</h2><div id="ttcOut" class="steps"></div></div></div>`; function min2(i){const r=combos(2)[i]; return `${r[0]?'A':'¬A'}·${r[1]?'B':'¬B'}`;} function draw(){const rows=combos(2); $('#ttcTable').innerHTML='<table><tr><th>A</th><th>B</th><th>S</th></tr>'+rows.map((r,i)=>`<tr>${r.map(tcell).join('')}<td><button class="bit ${vals[i]?'on':'off'}" data-tv="${i}"><strong>${vals[i]}</strong></button></td></tr>`).join('')+'</table>'; $$('[data-tv]').forEach(bt=>bt.onclick=()=>{vals[+bt.dataset.tv]^=1; draw();}); const found={'0001':'AND','0111':'OR','1110':'NAND','1000':'NOR','0110':'XOR','1001':'XNOR'}[vals.join('')]; const sop=vals.map((v,i)=>v?min2(i):null).filter(Boolean).join(' + ')||'0'; $('#ttcOut').innerHTML=found?`<p><strong>Porta detectada:</strong> ${GATES[found].txt}</p><p><strong>Expressió:</strong> <span class="mono">S = ${GATES[found].sym}</span></p>${truthTableGate(found)}`:`<p>No correspon a una porta bàsica única.</p><p><strong>Forma canònica:</strong> <span class="mono">S = ${sop}</span></p>`;} $('#ttcClear').onclick=()=>{vals=[0,0,0,0]; draw();}; draw();}
function safeExpr(expr,A,B,C,D){let e=expr.replace(/\s+/g,'').replace(/¬/g,'!').replace(/·/g,'&').replace(/\+/g,'|').replace(/⊕/g,'^'); if(!/^[ABCD01!&|^()]+$/i.test(e)) throw new Error('Expressió no vàlida'); e=e.replace(/A/gi,A?'1':'0').replace(/B/gi,B?'1':'0').replace(/C/gi,C?'1':'0').replace(/D/gi,D?'1':'0'); return bit(Function('return Boolean('+e+')')());}
function renderExpr(){ $('#expr').innerHTML=`<div class="grid"><div class="card"><h2>Expressió → taula</h2><p class="small">Operadors: ! o ¬, & o ·, | o +, ^ per XOR. Variables: A, B, C.</p><textarea id="exIn">(A & B) | !C</textarea><div class="btns"><button class="btn" id="exBtn">Genera taula</button><button class="btn secondary" id="exCopy">Copiar</button></div></div><div class="card"><h2>Resultat</h2><div id="exOut"></div></div></div>`; $('#exBtn').onclick=()=>{try{const e=$('#exIn').value; const rows=combos(3).map(r=>[...r,safeExpr(e,r[0],r[1],r[2],0)]); $('#exOut').innerHTML='<table><tr><th>A</th><th>B</th><th>C</th><th>S</th></tr>'+rows.map(r=>'<tr>'+r.map(tcell).join('')+'</tr>').join('')+'</table>';}catch(err){$('#exOut').innerHTML='<p class="badtxt">Expressió no vàlida. Revisa parèntesis i operadors.</p>';}}; $('#exCopy').onclick=()=>navigator.clipboard?.writeText($('#exOut').innerText); $('#exBtn').click();}
function renderKarnaugh(){let vals=Array(16).fill(0), gray=['00','01','11','10']; $('#karnaugh').innerHTML=`<div class="grid"><div class="card"><h2>Karnaugh 4 variables</h2><p class="small">Toca les cel·les per marcar 1 o 0.</p><div id="kmap"></div><div class="btns"><button class="btn secondary" id="kClear">Neteja</button><button class="btn secondary" id="kAll">Marca tot</button></div></div><div class="card"><h2>Guia</h2><div id="kOut" class="steps"></div></div></div>`; function mt(i){const s=i.toString(2).padStart(4,'0'),n=['A','B','C','D']; return s.split('').map((x,j)=>x==='1'?n[j]:'¬'+n[j]).join('·');} function draw(){let html='<div class="kmap"><div class="khead">AB\\CD</div>'+gray.map(x=>`<div class="khead">${x}</div>`).join(''); gray.forEach(ab=>{html+=`<div class="khead">${ab}</div>`; gray.forEach(cd=>{const i=parseInt(ab+cd,2); html+=`<button class="kcell ${vals[i]?'on':'off'}" data-k="${i}">${vals[i]}</button>`;});}); html+='</div>'; $('#kmap').innerHTML=html; $$('[data-k]').forEach(x=>x.onclick=()=>{vals[+x.dataset.k]^=1; draw();}); const mins=vals.map((v,i)=>v?i:null).filter(x=>x!==null); $('#kOut').innerHTML=mins.length?`<strong>1 marcats:</strong> Σm(${mins.join(', ')})<br><strong>Forma canònica:</strong><br><span class="mono">${mins.map(mt).join(' + ')}</span><hr><strong>Guia:</strong><br>1. Agrupa els 1 en blocs de 1, 2, 4, 8 o 16.<br>2. Fes els grups més grans possibles.<br>3. Les variables que canvien dins del grup desapareixen.`:'S = 0';} $('#kClear').onclick=()=>{vals.fill(0); draw();}; $('#kAll').onclick=()=>{vals.fill(1); draw();}; draw();}
function makeQ(level){const g=gateKeys[Math.floor(Math.random()*gateKeys.length)], n=GATES[g].n, c=combos(n)[Math.floor(Math.random()*2**n)], ans=evalGate(g,c); if(level==='N4'){return {txt:`Quina porta dona S=1 quan ${n===2?'A i B són diferents':'com a mínim dues entrades són 1'}?`,choices:n===2?['XOR','AND','OR']:['Majoritària','AND','NOT'],ansText:n===2?'XOR':'Majoritària'};} return {txt:`Calcula ${GATES[g].txt} amb ${['A','B','C'].slice(0,n).map((x,i)=>x+'='+c[i]).join(', ')}.`,ans};}
function renderPractice(){let qs=[],i=0,score=0; $('#practice').innerHTML=`<div class="grid"><div class="card"><h2>Pràctica per nivells</h2><label>Nivell</label><select id="plevel"><option>N1</option><option selected>N2</option><option>N3</option><option>N4</option></select><label>Preguntes</label><select id="pnum"><option>5</option><option selected>10</option><option>15</option></select><div class="btns"><button class="btn" id="pStart">Comença</button></div><div id="pBox"></div></div><div class="card"><h2>Resultat</h2><div id="pScore" class="out">0/0</div><div class="steps"><strong>N1/N2</strong>: calcular sortides.<br><strong>N3</strong>: interpretar circuits.<br><strong>N4</strong>: dissenyar funcions.</div></div></div>`; function start(){qs=Array.from({length:+$('#pnum').value},()=>makeQ($('#plevel').value)); i=0; score=0; show();} function show(){if(i>=qs.length){$('#pBox').innerHTML='<h3>Finalitzat</h3>'; $('#pScore').textContent=`${score}/${qs.length}`; return;} const q=qs[i]; if(q.choices){$('#pBox').innerHTML=`<p><strong>${i+1}/${qs.length}</strong> ${q.txt}</p><div class="btns">${q.choices.map(c=>`<button class="btn secondary" data-choice="${c}">${c}</button>`).join('')}</div><div id="pfb"></div>`; $$('[data-choice]').forEach(bt=>bt.onclick=()=>{const ok=bt.dataset.choice===q.ansText; if(ok)score++; $('#pfb').innerHTML=ok?'<p class="oktxt">Correcte.</p>':'<p class="badtxt">No és correcte.</p>'; setTimeout(()=>{i++;show();},650);});}else{$('#pBox').innerHTML=`<p><strong>${i+1}/${qs.length}</strong> ${q.txt}</p><div class="btns"><button class="btn" data-ans="1">S = 1</button><button class="btn secondary" data-ans="0">S = 0</button></div><div id="pfb"></div>`; $$('[data-ans]').forEach(bt=>bt.onclick=()=>{const ok=+bt.dataset.ans===q.ans; if(ok)score++; $('#pfb').innerHTML=ok?'<p class="oktxt">Correcte.</p>':'<p class="badtxt">Revisa la taula de veritat.</p>'; setTimeout(()=>{i++;show();},650);});} $('#pScore').textContent=`${score}/${i}`;} $('#pStart').onclick=start;}
function renderTeacher(){ $('#teacher').innerHTML=`<div class="grid"><div class="card"><h2>Mode docent</h2><label>Tipus de fitxa</label><select id="sheetType"><option value="truth">Taules de veritat</option><option value="circuit">Circuits</option><option value="exam">Examen ràpid</option></select><label><input type="checkbox" id="incTheory" style="width:auto" checked> Incloure teoria curta</label><label><input type="checkbox" id="incSol" style="width:auto" checked> Incloure solucions</label><label>Nombre de preguntes</label><select id="sheetN"><option>5</option><option selected>10</option><option>15</option></select><div class="btns"><button class="btn" id="makeSheet">Genera fitxa</button><button class="btn secondary" id="printSheetBtn">Imprimir només la fitxa</button></div></div><div class="card" id="sheetCard" style="grid-column:1/-1"><h2>Fitxa generada</h2><div id="sheet"></div></div></div>`; function make(){const typ=$('#sheetType').value,n=+$('#sheetN').value,sol=$('#incSol').checked,theory=$('#incTheory').checked; let html=theory?'<p><strong>Recordatori:</strong> AND exigeix totes les entrades a 1; OR exigeix com a mínim una entrada; NOT inverteix; XOR detecta entrades diferents.</p>':''; html+='<ol>'; for(let j=0;j<n;j++){ if(typ==='truth'){const g=gateKeys[j%gateKeys.length]; html+=`<li>Completa la taula de veritat de la porta <strong>${GATES[g].txt}</strong>.${sol?truthTableGate(g):'<br><br><br><br>'}</li>`;} else if(typ==='circuit'){html+=`<li>Interpreta el circuit: <span class="mono">S = ¬(OR(AND(A,B),C))</span>.${sol?'<br><strong>Guia:</strong> X=AND(A,B), Y=OR(X,C), S=¬Y.':''}</li>`;} else {const q=makeQ(j%4===3?'N4':'N2'); html+=`<li>${q.txt}${sol?` <strong>Solució: ${q.ansText||q.ans}</strong>`:''}</li>`;} } $('#sheet').innerHTML=html+'</ol>'; } $('#makeSheet').onclick=make; $('#printSheetBtn').onclick=printSheet; make();}
function renderHelp(){ $('#help').innerHTML=`<div class="grid"><div class="card"><h2>Estabilitat i aula</h2><p>Aquesta v3.2 afegeix controls perquè l'app no quedi buida sense avisar.</p><ul><li>Avís visible si falla el JavaScript.</li><li>Botó per netejar memòria cau i service worker.</li><li>Diagnosi de pestanyes carregades.</li><li>Mode fosc/clar.</li><li>Impressió només de la fitxa docent.</li></ul><div class="btns"><button class="btn secondary" id="darkBtn">Mode fosc/clar</button><button class="btn warn" id="diagBtn">Comprova pestanyes</button><button class="btn bad" id="resetBtn2">Neteja memòria cau</button></div></div><div class="card"><h2>Diagnosi</h2><div id="diagOut" class="steps">Encara no executada.</div></div></div>`; $('#darkBtn').onclick=()=>{document.body.classList.toggle('dark'); localStorage.setItem('plog-dark',document.body.classList.contains('dark')?'1':'0');}; $('#diagBtn').onclick=diagnose; $('#resetBtn2').onclick=resetApp;}
function diagnose(){const missing=tabs.filter(([id])=>!$('#'+id)||!$('#'+id).innerHTML.trim()).map(x=>x[1]); $('#diagOut').innerHTML=missing.length?`<p class="badtxt">Pestanyes sense contingut: ${missing.join(', ')}</p>`:`<p class="oktxt">Totes les pestanyes tenen contingut.</p><p>Versió: ${VERSION}</p>`; setStatus(missing.length?'Revisa diagnosi':'Tot carregat',''+(missing.length?'err':'ok'));}
function printSheet(){document.body.classList.add('print-sheet'); setTimeout(()=>window.print(),30);} window.addEventListener('afterprint',()=>document.body.classList.remove('print-sheet'));
async function resetApp(){try{localStorage.clear(); if('caches' in window){const keys=await caches.keys(); await Promise.all(keys.map(k=>caches.delete(k)));} if('serviceWorker' in navigator){const regs=await navigator.serviceWorker.getRegistrations(); await Promise.all(regs.map(r=>r.unregister()));}}catch(e){} location.reload();}
function init(){try{if(localStorage.getItem('plog-dark')==='1')document.body.classList.add('dark'); $('#reloadBtn').onclick=()=>location.reload(); $('#resetBtn').onclick=resetApp; initTabs(); renderSim(); renderCircuit(); renderTruth2Circuit(); renderExpr(); renderKarnaugh(); renderPractice(); renderTeacher(); renderHelp(); diagnose(); if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});}catch(e){showError(e.message||e);}}
init();
})();
</script>
</body>
