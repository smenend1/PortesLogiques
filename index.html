function $(id){return document.getElementById(id)}
function bit(v){return v?1:0} function not(v){return v?0:1}
function op(g,a,b,c){a=bit(a);b=bit(b);c=bit(c); if(g==='AND')return a&b; if(g==='OR')return a|b; if(g==='NAND')return not(a&b); if(g==='NOR')return not(a|b); if(g==='XOR')return a^b; if(g==='XNOR')return not(a^b); if(g==='NOT')return not(a); if(g==='MAJ')return (a+b+c)>=2?1:0; return 0}

 var h='<table><thead><tr>'+vars.map(function(v){return '<th>'+v+'</th>'}).join('')+'<th>S '+g+'</th></tr></thead><tbody>'; rows.forEach(function(r){h+='<tr>'+vars.map(function(v){return '<td>'+r.vals[v]+'</td>'}).join('')+'<td><b>'+r.s+'</b></td></tr>'}); return h+'</tbody></table>'}
function gateSvg(g,a,b,c){var s=op(g,a,b,c); var w=function(v){return v?'wire1':'wire0'}; var extra=(g==='NAND'||g==='NOR'||g==='XNOR')?'<circle class="bubble" cx="198" cy="80" r="8"/>':''; var body='';
 if(g==='AND'||g==='NAND'){body='<path class="gate" d="M80 35 L130 35 A45 45 0 0 1 130 125 L80 125 Z"/>'}

function renderSim(){var g=state.gate,a=state.bits.A,b=state.bits.B,c=state.bits.C,s=op(g,a,b,c); $('sim').innerHTML='<div class="grid"><div class="card"><h2>Simulador de porta</h2><label>Porta</label><select id="gateMain">'+Object.keys(gateInfo).map(function(x){return '<option '+(x===g?'selected':'')+' value="'+x+'">'+gateNames[x]+'</option>'}).join('')+'</select><div class="row" style="margin-top:12px">'+btnBit('A')+(g!=='NOT'?btnBit('B'):'')+(g==='MAJ'?btnBit('C'):'')+'</div><p>Sortida: <span class="out '+(s?'one':'zero')+'">S = '+s+'</span></p><p class="muted">'+gateInfo[g][1]+'</p></div><div class="card"><h2>Logigrama</h2>'+gateSvg(g,a,b,c)+'</div><div class="card"><h2>Taula de veritat</h2>'+truthTableGate(g)+'</div></div>'; $('gateMain').onchange=function(){state.gate=this.value;renderSim()}; document.querySelectorAll('[data-bit]').forEach(function(bu){bu.onclick=function(){var k=bu.dataset.bit;state.bits[k]=state.bits[k]?0:1;renderSim();}})}
function evalBuilder(vals){var b=state.builder; var A=b.notA?not(vals.A):vals.A, B=b.notB?not(vals.B):vals.B, C=b.notC?not(vals.C):vals.C, D=b.notD?not(vals.D):vals.D; var X=op(b.g1,A,B); if(b.notX)X=not(X); var Y=op(b.g2,X,C); if(b.notY)Y=not(Y); var Z=op(b.g3,Y,D); if(b.notZ)Z=not(Z); var S=b.notS?not(Z):Z; return {A:A,B:B,C:C,D:D,X:X,Y:Y,Z:Z,S:S}}
function exprBuilder(){var b=state.builder; var A=b.notA?'¬A':'A',B=b.notB?'¬B':'B',C=b.notC?'¬C':'C',D=b.notD?'¬D':'D'; var X=exprOp(b.g1,A,B); if(b.notX)X='¬'+X; var Y=exprOp(b.g2,'X',C); var Yc=exprOp(b.g2,X,C); if(b.notY){Y='¬'+Y;Yc='¬'+Yc} var Z=exprOp(b.g3,'Y',D); var Zc=exprOp(b.g3,Yc,D); if(b.notZ){Z='¬'+Z;Zc='¬'+Zc} var S=b.notS?'¬'+Zc:Zc; return {lines:['X = '+exprOp(b.g1,A,B)+(b.notX?' → ¬X':''),'Y = '+exprOp(b.g2,'X',C)+(b.notY?' → ¬Y':''),'Z = '+exprOp(b.g3,'Y',D)+(b.notZ?' → ¬Z':''),'S = '+(b.notS?'¬Z':'Z')],compact:'S = '+S}}
function truthBuilder(){var h='<div class="tableWrap"><table><thead><tr><th>A</th><th>B</th><th>C</th><th>D</th><th>X</th><th>Y</th><th>Z</th><th>S</th></tr></thead><tbody>'; for(var i=0;i<16;i++){var vals={A:(i>>3)&1,B:(i>>2)&1,C:(i>>1)&1,D:i&1}; var r=evalBuilder(vals); h+='<tr><td>'+vals.A+'</td><td>'+vals.B+'</td><td>'+vals.C+'</td><td>'+vals.D+'</td><td>'+r.X+'</td><td>'+r.Y+'</td><td>'+r.Z+'</td><td><b>'+r.S+'</b></td></tr>'} return h+'</tbody></table></div>'}
function miniGateSvg(g,x,y,label){
 var body='';

 else if(g==='OR'||g==='NOR'||g==='XOR'||g==='XNOR'){body=(g==='XOR'||g==='XNOR'?'<path class="gate" d="M'+(x-10)+' '+(y-35)+' C'+(x+8)+' '+(y-10)+' '+(x+8)+' '+(y+10)+' '+(x-10)+' '+(y+35)+'"/>':'')+'<path class="gate" d="M'+x+' '+(y-35)+' C'+(x+35)+' '+(y-35)+' '+(x+62)+' '+(y-18)+' '+(x+78)+' '+y+' C'+(x+62)+' '+(y+18)+' '+(x+35)+' '+(y+35)+' '+x+' '+(y+35)+' C'+(x+18)+' '+(y+8)+' '+(x+18)+' '+(y-8)+' '+x+' '+(y-35)+' Z"/>'}

}

function renderBuilder(){var b=state.builder, e=exprBuilder(), r=evalBuilder(state.bits); $('builder').innerHTML='<div class="split"><div class="card"><h2>Constructor avançat v4.2</h2><div class="grid"><div><label>Porta 1: A,B → X</label>'+gateSelect('g1',b.g1)+'</div><div><label>Porta 2: X,C → Y</label>'+gateSelect('g2',b.g2)+'</div><div><label>Porta 3: Y,D → Z</label>'+gateSelect('g3',b.g3)+'</div></div><h3>Entrades actuals</h3><div class="row">'+btnBit('A')+btnBit('B')+btnBit('C')+btnBit('D')+'</div><h3>NOT configurables</h3><div class="row">'+['A','B','C','D','X','Y','Z','S'].map(function(k){var prop='not'+k;return '<label class="pill"><input type="checkbox" data-not="'+prop+'" '+(b[prop]?'checked':'')+'> ¬'+k+'</label>'}).join('')+'</div><div class="hint"><b>Ajuda ràpida:</b> tria les tres portes, activa les negacions que necessitis i toca A/B/C/D per simular una combinació. La taula de veritat es genera automàticament.</div><p>Sortida final: <span class="out finalOut '+(r.S?'one':'zero')+'">S = '+r.S+'</span></p></div><div class="card"><h2>Logigrama del circuit</h2>'+circuitSvg()+'</div></div><div class="grid" style="margin-top:14px"><div class="card"><h2>Expressió automàtica</h2><p class="mono">'+e.lines.join('<br>')+'</p><p class="mono"><b>'+e.compact+'</b></p><button class="btn secondary" id="copyExpr">Copiar expressió</button></div><div class="card"><h2>Simulació pas a pas</h2><p class="mono">A='+state.bits.A+', B='+state.bits.B+', C='+state.bits.C+', D='+state.bits.D+'<br>X='+r.X+' · Y='+r.Y+' · Z='+r.Z+' · S='+r.S+'</p><button class="btn secondary" onclick="window.print()">Imprimir vista</button></div></div><div class="card printArea" style="margin-top:14px"><h2>Taula de veritat completa</h2>'+truthBuilder()+'</div>'; ['g1','g2','g3'].forEach(function(id){$(id).onchange=function(){state.builder[id]=this.value;renderBuilder()}}); document.querySelectorAll('[data-bit]').forEach(function(bu){bu.onclick=function(){var k=bu.dataset.bit;state.bits[k]=state.bit function loadExample(n){var b=state.builder; if(n===1){Object.assign(b,{g1:'AND',g2:'OR',g3:'AND',notA:false,notB:false,notC:false,notD:false,notX:false,notY:false,notZ:false,notS:false})} if(n===2){Object.assign(b,{g1:'OR',g2:'AND',g3:'OR',notA:false,notB:false,notC:true,notD:false,notX:false,notY:false,notZ:false,notS:false})} if(n===3){Object.assign(b,{g1:'NAND',g2:'NAND',g3:'NAND',notA:false,notB:false,notC:false,notD:false,notX:false,notY:false,notZ:false,notS:false})} showTab('builder')}
function renderExamples(){var arr=['Alarma: A i B, o anul·lació C','Motor amb seguretat: (A+B)·¬C','Circuit amb NAND universal']; $('examples').innerHTML='<div class="card"><h2>Biblioteca d’exemples</h2><p class="muted">Carrega un circuit i després modifica’l al constructor.</p>'+arr.map(function(t,i){return '<p><button class="btn" onclick="loadExample('+(i+1)+')">Carregar</button> <b>'+t+'</b></p>'}).join('')+'</div>'}
function renderTruth2Gate(){$('truth2gate').innerHTML='<div class="card"><h2>Taula → porta</h2><p>Introdueix les sortides per A,B = 00, 01, 10, 11.</p><div class="row"><input id="tbits" value="0111" maxlength="4" style="max-width:160px"><button class="btn" id="recGate">Reconèixer</button></div><div id="recOut" style="margin-top:12px"></div></div>'; $('recGate').onclick=function(){var s=$('tbits').value.replace(/[^01]/g,''); var map={'0000':'Sempre 0','0001':'AND','0111':'OR','1110':'NAND','1000':'NOR','0110':'XOR','1001':'XNOR','1111':'Sempre 1'}; $('recOut').innerHTML='<p class="out '+((map[s]&&map[s]!=='Sempre 0')?'one':'zero')+'">'+(map[s]||'No és una porta bàsica de dues entrades')+'</p>'}}
function evalExprRaw(text,vals){var e=text.replace(/\s+/g,'').replace(/¬/g,'!').replace(/·/g,'&').replace(/\+/g,'|').replace(/⊕/g,'^').replace(/[ABCD]/g,function(m){return vals[m]}); if(!/^[01!&|^()]+$/.test(e))throw new Error('Expressió no vàlida'); return Function('return Number('+e+')')()?1:0}
function renderExpr(){$('expr').innerHTML='<div class="card"><h2>Expressió → taula</h2><p>Escriu amb A, B, C, D. Pots usar ·, +, ¬, ⊕ o també &, |, !, ^.</p><input id="exprIn" value="(A·B)+¬C"><button class="btn" id="exprBtn" style="margin-top:10px">Generar taula</button><div id="exprOut" style="margin-top:12px"></div></div>'; $('exprBtn').onclick=function(){var text=$('exprIn').value; var h='<table><tr><th>A</th><th>B</th><th>C</th><th>D</th><th>S</th></tr>'; try{for(var i=0;i<16;i++){var v={A:(i>>3)&1,B:(i>>2)&1,C:(i>>1)&1,D:i&1}; h+='<tr><td>'+v.A+'</td><td>'+v.B+'</td><td>'+v.C+'</td><td>'+v.D+'</td><td><b>'+evalExprRaw(text,v)+'</b></td></tr>'} $('exprOut').innerHTML=h+'</table>'}catch(err){$('exprOut').innerHTML='<p class="errorBox" style="display:block">'+err.message+'</p>'}}}
function renderK(){var labels=['00','01','11','10']; var h='<div class="card"><h2>Karnaugh 4 variables</h2><p>Clica cel·les per marcar 0/1. Files AB i columnes CD en codi Gray.</p><table class="kmap"><tr><th>AB\\CD</th>'+labels.map(function(x){return '<th>'+x+'</th>'}).join('')+'</tr>'; for(var r=0;r<4;r++){h+='<tr><th>'+labels[r]+'</th>'; for(var c=0;c<4;c++){var idx=r*4+c; h+='<td data-k="'+idx+'" class="'+(state.kvals[idx]?'k1':'k0')+'">'+state.kvals[idx]+'</td>'} h+='</tr>'} h+='</table><p class="muted">Guia: agrupa 1 en blocs de 1, 2, 4, 8 o 16. La simplificació automàtica completa es pot fer en una versió posterior.</p></div>'; $('karnaugh').innerHTML=h; document.querySelectorAll('[data-k]').forEach(function(td){td.onclick=function(){var i=Number(td.dataset.k);state.kvals[i]=state.kvals[i]?0:1;renderK()}})}
var questions=[['Quina porta dona 1 només si A i B són 1?','AND'],['Quina porta dona 1 si A i B són diferents?','XOR'],['La negació de AND és...','NAND'],['Si A=0 i B=0, OR dona...','0'],['Si A=1 i B=1, NAND dona...','0']];
function newQuestion(){var q=questions[Math.floor(Math.random()*questions.length)]; $('practice').innerHTML='<div class="card"><h2>Pràctica N1-N4</h2><p><b>'+q[0]+'</b></p><input id="ans"><button class="btn" id="checkAns" style="margin-top:10px">Comprovar</button><div id="ansOut"></div></div>'; $('checkAns').onclick=function(){var ok=$('ans').value.trim().toUpperCase()===q[1]; $('ansOut').innerHTML='<p class="out '+(ok?'one':'zero')+'">'+(ok?'Correcte':'Revisa-ho. Resposta: '+q[1])+'</p><button class="btn secondary" onclick="newQuestion()">Una altra</button>'}}
function escHtml(s){return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]})}
function printFitxa(){var fit=$('fitxa'); if(!fit){alert('No he trobat la fitxa. Torna a generar-la.'); return} var content=fit.innerHTML; if(!content || content.indexOf('Encara no generada')!==-1){alert('Primer genera la fitxa.'); return} var title=$('fitTitle')?$('fitTitle').value:'Fitxa de circuits lògics'; var css='body{font-family:Arial,sans-serif;color:#111;margin:22px;line-height:1.35}h1,h2{margin:0 0 12px}ol{padding-left:24px}li{margin:10px 0 18px}table{border-collapse:collapse;width:100%;margin:10px 0}th,td{border:1px solid #999;padding:6px;text-align:center}.box{border:1px solid #ddd;border-radius:12px;padding:18px}.muted{color:#666}@page{margin:16mm}@media print{button{display:none}}'; var html='<!doctype html><html lang="ca"><head><meta charset="utf-8"><title>'+escHtml(title)+'</title><style>'+css+'</style></head><body><div class="box">'+content+'</div><script>window.onload=function(){setTimeout(function(){window.focus();window.print();},150)}<\/script></body></html>'; var w=window.open('', '_blank'); if(!w){alert('El navegador ha bloquejat la finestra d’impressió. Permet finestres emergents o prova de nou.'); return} w.document.open(); w.document.write(html); w.document.close()}
function renderTeacher(){$('teacher').innerHTML='<div class="card noPrint"><h2>Mode docent</h2><p class="hint"><b>Impressió corregida v4.2:</b> el PDF s’obre en una finestra nova amb només la fitxa generada. Així evitem la prèvia en blanc del navegador.</p><label>Títol de la fitxa</label><input id="fitTitle" value="Fitxa de circuits lògics"><label>Nombre de preguntes</label><select id="fitN"><option>5</option><option>10</option><option>15</option></select><div class="row" style="margin-top:10px"><button class="btn" id="genFit">Generar fitxa</button><button class="btn secondary" id="printFit">Imprimir fitxa / PDF</button></div></div><div id="fitxa" class="card printArea"><h2>Fitxa generada</h2><p class="muted">Encara no generada.</p></div>'; $('genFit').onclick=function(){var n=Number($('fitN').value); var h='<h2>'+escHtml($('fitTitle').value)+'</h2><ol>'; for(var i=1;i<=n;i++){h+='<li><b>Exercici '+i+':</b> completa la taula de veritat o dibuixa el logigrama d’un circuit amb portes AND, OR, NOT, NAND o XOR.<br><br><span class="muted">Resposta:</span> ________________________________________________</li>'} h+='</ol><p><b>Solucions:</b> activables verbalment pel docent.</p>'; $('fitxa').innerHTML=h}; $('printFit').onclick=printFitxa}
function renderHelp(){var ok=tabs.every(function(t){return $(t[0])}); $('help').innerHTML='<div class="card"><h2>Ajuda i diagnosi</h2><p>Estat de pestanyes: <span class="status">'+(ok?'correcte':'hi falta alguna pestanya')+'</span></p><p class="muted">Versió v4.2: correcció específica de la impressió de fitxes docents amb finestra d’impressió independent.</p><button class="btn secondary" id="darkBtn">Mode fosc/clar</button> <button class="btn danger" id="clearBtn">Netejar memòria cau</button><p class="muted">Si GitHub Pages mostra una versió antiga, prem netejar memòria cau i recarrega.</p></div>'; $('darkBtn').onclick=function(){document.body.classList.toggle('dark')}; $('clearBtn').onclick=function(){if('serviceWorker' in navigator){navigator.serviceWorker.getRegistrations().then(function(rs){rs.forEach(function(r){r.unregister()})})} if(window.caches){caches.keys().then(function(keys){keys.forEach(function(k){caches.delete(k)})})} alert('Memòria cau demanada per esborrar. Recarrega la pàgina.')}}
function init(){initTabs(); renderSim(); renderBuilder(); renderExamples(); renderTruth2Gate(); renderExpr(); renderK(); newQuestion(); renderTeacher(); renderHelp(); if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}}
init();
