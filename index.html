<!doctype html>
<html lang="ca">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#234f8f">
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icon-192.png">
  <title>Portes Lògiques Plus</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    :root{--primary:#234f8f;--primary2:#2f6bb3;--soft:#eaf2ff;--bg:#f5f8fc;--text:#162338;--muted:#5d6b7d;--card:#fff;--ok:#0f7b55;--bad:#b3261e;--line:#d7e2f2;--warn:#936900}
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
    header{background:linear-gradient(135deg,var(--primary),var(--primary2));color:white;padding:18px 14px;border-bottom-left-radius:22px;border-bottom-right-radius:22px;box-shadow:0 6px 20px #0002}header h1{font-size:1.55rem;margin:0 0 4px}header p{margin:0;opacity:.92}
    nav{display:flex;gap:8px;overflow:auto;padding:10px 10px 4px;position:sticky;top:0;background:rgba(245,248,252,.96);backdrop-filter:blur(8px);z-index:10}nav button{white-space:nowrap;border:1px solid var(--line);background:white;color:var(--primary);border-radius:999px;padding:10px 14px;font-weight:700}nav button.active{background:var(--primary);color:white}
    main{padding:14px;max-width:1180px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 6px 20px #234f8f10}.card h2,.card h3{margin-top:0}.muted{color:var(--muted)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}.field{margin:10px 0}.field label{display:block;font-weight:700;margin-bottom:5px}input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:12px;font:inherit;background:white}textarea{min-height:90px}.btn{border:0;border-radius:12px;background:var(--primary);color:#fff;padding:10px 14px;font-weight:800;cursor:pointer}.btn.secondary{background:#e8f0fb;color:var(--primary);border:1px solid var(--line)}.btn.warn{background:#fff4d8;color:#6f4d00;border:1px solid #f0d28a}.btn.danger{background:#ffe8e7;color:var(--bad);border:1px solid #f5b5b0}.btn:active{transform:translateY(1px)}
    .pill{display:inline-flex;gap:5px;align-items:center;border-radius:999px;background:var(--soft);color:var(--primary);padding:6px 10px;font-weight:700;margin:3px}.valuebtn{width:58px;height:44px;border-radius:12px;border:1px solid var(--line);background:white;font-weight:900;color:var(--primary);font-size:1.1rem}.valuebtn.on{background:var(--primary);color:white}.result{font-size:1.5rem;font-weight:900;color:var(--primary);padding:10px 14px;border-radius:14px;background:var(--soft);display:inline-block}.formula{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#f0f5fc;border:1px solid var(--line);padding:10px;border-radius:12px;overflow:auto}.truth{width:100%;border-collapse:collapse;margin-top:10px}.truth th,.truth td{border:1px solid var(--line);padding:8px;text-align:center}.truth th{background:#eaf2ff;color:var(--primary)}.truth td.one{background:#e7f7ef;color:var(--ok);font-weight:900}.truth td.zero{background:#fff0f0;color:var(--bad);font-weight:900}.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:10px 0}.mini{font-size:.9rem}.hidden{display:none!important}.svgbox{background:#f8fbff;border:1px solid var(--line);border-radius:16px;padding:10px;overflow:auto}.step{border-left:5px solid var(--primary);background:#f8fbff;padding:10px 12px;border-radius:12px;margin:10px 0}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#eef3fa;border:1px solid var(--line);border-radius:6px;padding:1px 5px}.print-only{display:none}
    @media print{header,nav,.no-print,.btn{display:none!important}body{background:white}.card{box-shadow:none;border:1px solid #aaa;break-inside:avoid}.print-only{display:block}main{padding:0}.truth th{background:#eee!important;color:#000}.truth td.one,.truth td.zero{background:#fff!important;color:#000}}
  </style>
</head>
<body>
<header>
  <h1>Portes Lògiques Plus</h1>
  <p>PWA per entendre, calcular, dibuixar i practicar portes lògiques i taules de veritat.</p>
</header>
<nav id="nav"></nav>
<main id="app"></main>
<script src="./app.js"></script>
</body>
</html>
